<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>수어 학습 사이트</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#0b0d12;
      --panel:#121722;
      --panel-2:#1a2230;
      --line:#2b3445;
      --text:#edf2ff;
      --sub:#a9b6cc;
      --accent:#6ea8ff;
      --accent-2:#8ef0c2;
      --warning:#ffc76e;
      --danger:#ff7b7b;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
      --header-h:176px;
      --footer-h:116px;
    }

    *{box-sizing:border-box;}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      overflow:hidden;
    }

    body{
      height:100vh;
      height:100dvh;
    }

    button,select,input{
      font:inherit;
    }

    .app{
      display:grid;
      grid-template-rows:auto minmax(0, 1fr) auto;
      height:100%;
      width:100%;
      min-height:0;
    }

    .header{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      background:rgba(10,13,18,.94);
      backdrop-filter:blur(10px);
      position:relative;
      z-index:50;
    }

    .header-row{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
    }

    .search-wrap{
      position:relative;
      flex:1;
      min-width:220px;
    }

    .search{
      width:100%;
      height:42px;
      touch-action:manipulation;
      -webkit-user-select:text;
      user-select:text;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 14px;
      background:#fff;
      color:#111;
      font-size:15px;
    }

    .search-suggestions{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      background:#fff;
      color:#111;
      border-radius:14px;
      box-shadow:0 18px 40px rgba(0,0,0,.32);
      overflow:auto;
      display:none;
      max-height:min(62vh, 520px);
      z-index:9999;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .search-suggestions.open{
      display:block;
    }

    /* 드롭다운 형태의 접속 코드 목록을 위한 스타일 */
    .sync-room-list-container{
      position:absolute;
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:8px;
      z-index:10000;
      box-shadow:0 6px 16px rgba(0,0,0,.4);
      padding:4px 0;
      min-width:120px;
      max-height:240px;
      overflow-y:auto;
      display:none;
    }
    .sync-room-list-item{
      padding:6px 12px;
      cursor:pointer;
      font-size:14px;
      color:var(--text);
      white-space:nowrap;
    }
    .sync-room-list-item:hover{
      background:rgba(255,255,255,.08);
    }

    .suggestion-item{
      padding:10px 12px;
      border-bottom:1px solid #eceff4;
      cursor:pointer;
      line-height:1.45;
      font-size:14px;
      touch-action:pan-y manipulation;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .suggestion-item:last-child{
      border-bottom:none;
    }

    .suggestion-item:hover,
    .suggestion-item.active{
      background:#eef5ff;
    }

    .suggestion-sub{
      display:block;
      font-size:12px;
      color:#56657d;
      margin-top:4px;
    }

    .scope-select,
    .category-select{
      height:42px;
      min-width:132px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 12px;
      background:#fff;
      color:#111;
      cursor:pointer;
      font-size:14px;
    }

    .count-badge{
      white-space:nowrap;
      color:var(--sub);
      font-size:13px;
      padding:0 6px;
      min-width:72px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      border-radius:12px;
      border:1px solid transparent;
      height:42px;
    }

    .quick-btn{
      display:none;
    }

    .header-row-search{
      flex-wrap:nowrap;
    }

    .header-row-search .search-wrap{
      min-width:0;
    }

    .header-row-actions,
    .header-row-sync{
      min-width:0;
    }

    .header-row-actions .sync-room-input{
      min-width:140px;
      flex:1 1 160px;
    }

    .header-row-actions .firebase-status{
      min-width:88px;
      height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      font-size:12px;
    }

    .stage-tap-zone{
      position:absolute;
      top:0;
      bottom:0;
      width:18%;
      z-index:8;
      display:none;
      background:transparent;
      border:none;
      outline:none;
      padding:0;
      margin:0;
      appearance:none;
      -webkit-appearance:none;
      box-shadow:none;
      -webkit-tap-highlight-color:transparent;
    }

    .stage-tap-zone.left{ left:0; }
    .stage-tap-zone.right{ right:0; }

    .stage-tap-zone::after{
      content:"";
      display:none;
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:34px;
      height:34px;
      border-radius:999px;
      background:rgba(5,10,18,.18);
      opacity:0;
      transition:.15s ease;
    }

    .stage-tap-zone.left::after{ left:6px; }
    .stage-tap-zone.right::after{ right:6px; }

    .stage-tap-zone:active::after{
      opacity:1;
    }

    .stage-tap-zone .tap-arrow{
      position:absolute;
      display:none !important;
      top:50%;
      transform:translateY(-50%);
      color:rgba(255,255,255,.75);
      font-size:22px;
      font-weight:700;
      opacity:0;
      pointer-events:none;
      display:none;
    }

    .stage-tap-zone.left .tap-arrow{ left:14px; }
    .stage-tap-zone.right .tap-arrow{ right:14px; }


    video::-webkit-media-controls-overlay-play-button,
    video::-webkit-media-controls-start-playback-button{
      display:none !important;
      -webkit-appearance:none;
      opacity:0 !important;
    }

    .rotate-hotspot{
      position:absolute;
      left:0;
      top:0;
      width:min(10vmin, 56px);
      height:min(10vmin, 56px);
      z-index:40;
      border:none;
      background:transparent;
      color:transparent;
      opacity:.03;
      display:none;
      pointer-events:auto;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    .rotate-hotspot:active{
      opacity:.08;
    }

    .top-home-btn{
      display:none;
    }

    .firebase-status{
      min-width:0;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
    }


.sync-room-input{
  height:42px;
  min-width:150px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 12px;
  background:#fff;
  color:#111;
  font-size:14px;
  flex:1 1 180px;
}

.firebase-status{
  min-height:42px;
  padding:0 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:var(--sub);
  font-size:13px;
  display:inline-flex;
  align-items:center;
  white-space:nowrap;
}

.firebase-status.ok{
  color:#dffbe8;
  border-color:#2f855a;
  background:rgba(47,133,90,.18);
}

.firebase-status.error{
  color:#ffdada;
  border-color:#b84b4b;
  background:rgba(184,75,75,.16);
}

    .icon-btn,.mode-btn,.nav-btn,.playback-btn,.select-btn,.link-btn{
      border:none;
      outline:none;
      cursor:pointer;
      color:var(--text);
      background:var(--panel-2);
      border:1px solid var(--line);
      transition:.15s ease;
      border-radius:12px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .icon-btn:hover,.mode-btn:hover,.nav-btn:hover,.playback-btn:hover,.select-btn:hover,.link-btn:hover{
      transform:translateY(-1px);
      border-color:#45618d;
    }

    .icon-btn,.playback-btn,.select-btn,.link-btn{
      height:42px;
      min-width:42px;
      padding:0 12px;
      white-space:nowrap;
      font-size:14px;
    }

    .select-btn.active,
    .playback-btn.active{
      background:linear-gradient(180deg,#5f4d16,#47390f);
      border-color:var(--warning);
      color:#fff3d4;
    }

    .main{
      display:grid;
      grid-template-columns:1.35fr .9fr;
      gap:14px;
      padding:14px;
      min-height:0;
      overflow:hidden;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-height:0;
      overflow:hidden;
    }

    .viewer{
      display:flex;
      flex-direction:column;
      min-height:0;
      position:relative;
    }

    .stage{
      flex:1;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      position:relative;
      overflow:hidden;
      touch-action:pan-y pinch-zoom;
    }

    video,
    .main-frame,
    .main-image,
    .main-text{
      width:100%;
      height:100%;
      display:none;
      background:#000;
    }

    video,
    .main-image{
      object-fit:contain;
    }

    .main-frame{
      border:0;
    }

    .main-image{
      user-select:none;
      -webkit-user-drag:none;
      transform-origin:center center;
      will-change:transform;
    }

    .main-gallery{
      width:100%;
      height:100%;
      display:none;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:4px;
      background:#000;
    }

    .main-gallery.is-single{
      padding:0;
      gap:0;
    }

    .main-gallery-item{
      flex:1 1 0;
      min-width:0;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      overflow:hidden;
      background:#05070b;
    }

    .main-gallery.is-single .main-gallery-item{
      border:none;
      border-radius:0;
      background:#000;
    }

    .main-gallery-item img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .main-image.zoomable{
      touch-action:none;
    }

    .main-image.zoomed{
      cursor:grab;
    }

    .main-text{
      display:none;
      align-items:center;
      justify-content:center;
      padding:clamp(18px,4vw,64px);
      text-align:center;
      font-weight:800;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:keep-all;
      color:#f7f9ff;
      background:
        radial-gradient(circle at 18% 20%, rgba(110,168,255,.18), transparent 28%),
        radial-gradient(circle at 82% 28%, rgba(142,240,194,.12), transparent 28%),
        linear-gradient(180deg, #0b0f17 0%, #101725 100%);
      font-size:clamp(28px,4.2vw,68px);
    }

    .overlay-msg{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,.74);
      color:#fff;
      border:1px solid rgba(255,255,255,.15);
      padding:12px 16px;
      border-radius:12px;
      font-size:16px;
      z-index:60;
      display:none;
      text-align:center;
      max-width:min(84vw, 900px);
      line-height:1.7;
      white-space:pre-wrap;
      word-break:keep-all;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    .drop-hint{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.45);
      color:#e8f0ff;
      font-size:18px;
      font-weight:700;
      z-index:55;
      pointer-events:none;
      opacity:0;
      transition:opacity .15s ease;
      text-align:center;
      padding:24px;
      line-height:1.6;
    }

    .drop-hint.show{
      opacity:1;
    }

    .viewer-bottom{
      /* hide bottom preview images in non-fullscreen to only show a single active panel */
      display:none;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
      border-top:1px solid var(--line);
      background:var(--panel);
    }

    .img-box{
      min-height:126px;
      background:#0d1118;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .img-box img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
    }

    .img-label{
      position:absolute;
      left:10px;
      top:10px;
      font-size:12px;
      color:#d7e2f7;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
      padding:4px 8px;
      border-radius:999px;
    }

    .info{
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .info-scroll{
      flex:1;
      overflow:auto;
      padding:14px 14px 10px;
      -webkit-overflow-scrolling:touch;
    }

    .info-scroll::-webkit-scrollbar{width:10px;}
    .info-scroll::-webkit-scrollbar-thumb{
      background:#2a3445;
      border-radius:999px;
      border:2px solid transparent;
      background-clip:padding-box;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
      justify-content:space-between;
      margin-bottom:8px;
    }

    .word{
      font-size:30px;
      font-weight:800;
      line-height:1.15;
      margin:0;
      word-break:keep-all;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      background:var(--panel-2);
      border:1px solid var(--line);
      color:var(--sub);
      font-size:13px;
    }

    .section{
      margin-top:10px;
      padding:12px;
      border-radius:16px;
      background:var(--panel);
      border:1px solid var(--line);
    }

    .section:first-of-type{
      margin-top:0;
    }

    .section h3{
      margin:0 0 8px;
      font-size:15px;
      color:#cfe0ff;
    }

    .section .content{
      font-size:15px;
      line-height:1.55;
      color:#f4f7ff;
      word-break:keep-all;
      white-space:pre-wrap;
    }

    .status-list{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .selection-toggle-btn{
      margin-left:auto;
    }

    .selection-panel.is-collapsed .selection-body{
      display:none;
    }

    .selection-panel{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .selection-top{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .selection-search-wrap{
      position:relative;
      flex:1;
      min-width:220px;
    }

    .selection-search{
      width:100%;
      height:40px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 12px;
      background:#fff;
      color:#111;
      font-size:14px;
    }

    .selection-suggestions{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      background:#fff;
      color:#111;
      border-radius:14px;
      box-shadow:0 18px 40px rgba(0,0,0,.32);
      overflow:auto;
      display:none;
      max-height:320px;
      z-index:9999;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      touch-action:pan-y;
    }

    .selection-suggestions.open{
      display:block;
    }

    .preset-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .preset-input,
    .preset-select{
      height:38px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:0 10px;
      background:#fff;
      color:#111;
      font-size:14px;
    }

    .preset-input{
      min-width:140px;
      flex:1;
    }

    .preset-select{
      min-width:140px;
      flex:1;
    }

    .selected-chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-height:22px;
      max-height:180px;
      overflow:auto;
      padding-right:2px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#20324a;
      border:1px solid #3b5d88;
      color:#edf4ff;
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .chip:active{
      transform:scale(.98);
      background:#294061;
    }

    .chip button{
      border:none;
      background:none;
      color:#cfe0ff;
      cursor:pointer;
      font-size:14px;
      padding:0;
      line-height:1;
      pointer-events:none;
    }

    .footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 14px;
      border-top:1px solid var(--line);
      background:rgba(10,13,18,.94);
      backdrop-filter:blur(10px);
    }

    .nav-group,.mode-group,.extra-group{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
    }

    .nav-btn{
      min-width:56px;
      height:46px;
      border-radius:14px;
      font-size:18px;
      padding:0 14px;
    }

    .mode-btn{
      min-width:42px;
      height:46px;
      border-radius:14px;
      padding:0 10px;
      font-weight:700;
      font-size:14px;
    }

    .mode-btn.active{
      background:linear-gradient(180deg, #2b4f8d, #224073);
      border-color:#6ea8ff;
    }

    .status{
      /* 설명 텍스트를 항상 숨깁니다. 홈 버튼과 모드 버튼 사이에 여백이 생기지 않도록 display:none 처리 */
      display:none;
      color:var(--sub);
      font-size:13px;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:center;
      flex:1;
    }

    .empty{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      text-align:center;
      color:var(--sub);
      padding:20px;
      line-height:1.8;
    }

    .mobile-sheet{
      position:fixed;
      left:0;
      right:0;
      bottom:72px;
      max-height:60vh;
      background:#0f141d;
      border-top-left-radius:20px;
      border-top-right-radius:20px;
      border:1px solid var(--line);
      box-shadow:0 -10px 30px rgba(0,0,0,.35);
      transform:translateY(110%);
      transition:.22s ease;
      z-index:160;
      overflow:hidden;
      display:none;
    }

    .mobile-sheet.open{
      transform:translateY(0);
    }

    .mobile-list-btn{
      width:100%;
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      text-align:left;
      padding:10px 12px;
      margin-bottom:8px;
    }

    .mobile-list-btn.active{
      border-color:var(--accent);
      background:rgba(110,168,255,.15);
    }

    .mobile-sheet-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#111826;
    }

    .mobile-sheet-body{
      overflow:auto;
      max-height:calc(60vh - 56px);
      padding:12px 14px 18px;
    }

    .sheet-handle{
      width:54px;
      height:5px;
      background:#47546a;
      border-radius:999px;
      margin:0 auto 8px;
    }


    .note-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:12000;
    }

    .note-modal.open{
      display:flex;
    }

    .note-dialog{
      width:min(720px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    // 화살표 버튼을 누르면 해당 목록을 드롭다운 형태로 보여줍니다. 선택된 항목을
    // 클릭하면 입력창에 자동으로 채워지고 즉시 접속을 시도합니다.

    const FIREBASE_ROOM_HISTORY_KEY = "ksl-nuri-room-history";
    let roomHistory = [];

    /**
     * 로컬 스토리지에 저장된 접속 코드 히스토리를 불러옵니다.
     * 중복 제거와 유효성 검사를 수행하며, 항상 기본 방(main)을 포함합니다.
     */
    function loadRoomHistory(){
      try {
        const raw = localStorage.getItem(FIREBASE_ROOM_HISTORY_KEY);
        if (raw){
          const arr = JSON.parse(raw);
          if (Array.isArray(arr)){
            roomHistory = arr.filter(r => typeof r === "string" && r.trim()).map(r => sanitizeRoomKey(r));
          }
        }
      } catch(err){
        console.warn("room history 로드 실패", err);
      }
      // 기본 방을 항상 포함
      if (!roomHistory.includes(FIREBASE_DEFAULT_ROOM)) roomHistory.unshift(FIREBASE_DEFAULT_ROOM);
      // 현재 방을 우선순위에 반영
      if (syncRoomKey && !roomHistory.includes(syncRoomKey)) roomHistory.unshift(syncRoomKey);
    }

    /**
     * 접속 코드 히스토리를 저장합니다. 저장하기 전에 중복을 제거합니다.
     */
    function saveRoomHistory(){
      try {
        const unique = Array.from(new Set(roomHistory.filter(r => !!r)));
        localStorage.setItem(FIREBASE_ROOM_HISTORY_KEY, JSON.stringify(unique));
      } catch(err){
        console.warn("room history 저장 실패", err);
      }
    }

    /**
     * 히스토리에 새로운 키를 추가하고 저장합니다. 이미 존재하면 맨 앞으로 이동합니다.
     * 최대 30개까지 보존합니다.
     * @param {string} key
     */
    function updateRoomHistory(key){
      const clean = sanitizeRoomKey(key);
      if (!clean) return;
      roomHistory = roomHistory.filter(r => r !== clean);
      roomHistory.unshift(clean);
      if (roomHistory.length > 30) roomHistory = roomHistory.slice(0, 30);
      saveRoomHistory();
    }

    function withTimeout(promise, ms, label = "작업"){
      let timer = null;
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          timer = setTimeout(() => reject(new Error(`${label} 시간 초과`)), ms);
        })
      ]).finally(() => {
        clearTimeout(timer);
      });
    }

    function loadExternalScript(url){
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[data-dynamic-src="${url}"]`);
        if (existing){
          if (existing.dataset.loaded === "1"){
            resolve(true);
            return;
          }
          existing.addEventListener("load", () => resolve(true), { once:true });
          existing.addEventListener("error", () => reject(new Error(`스크립트 로드 실패: ${url}`)), { once:true });
          return;
        }
        const script = document.createElement("script");
        script.src = url;
        script.async = true;
        script.dataset.dynamicSrc = url;
        script.addEventListener("load", () => {
          script.dataset.loaded = "1";
          resolve(true);
        }, { once:true });
        script.addEventListener("error", () => reject(new Error(`스크립트 로드 실패: ${url}`)), { once:true });
        document.head.appendChild(script);
      });
    }

    async function ensureXlsxAvailable(){

            "https://unpkg.com/xlsx/dist/xlsx.full.min.js"
          ];
          let lastErr = null;
          for (const url of urls){
            try{
              await loadExternalScript(url);
              if (typeof XLSX !== "undefined") return true;
            } catch (err){
              lastErr = err;
            }
          }
          throw lastErr || new Error("XLSX 라이브러리를 불러오지 못했습니다.");
        })().catch(err => {
          xlsxLoadPromise = null;
          throw err;
        });
      }
      return xlsxLoadPromise;
    }

        });

    function openIDB(){
      return new Promise((resolve, reject) => {
        if (typeof indexedDB === "undefined"){
          reject(new Error("IndexedDB 미지원"));
          return;
        }

        const req = indexedDB.open(IDB_DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(IDB_STORE)){
            db.createObjectStore(IDB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("IndexedDB 오류"));
        req.onblocked = () => reject(new Error("IndexedDB blocked"));
      });
    }

    async function idbSet(key, value){
      try{
        const db = await withTimeout(openIDB(), 2500, "IndexedDB 열기");
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readwrite");
          tx.objectStore(IDB_STORE).put(value, key);
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror = () => { db.close(); reject(tx.error); };
        });
      } catch (err){
        console.warn("IndexedDB 저장 실패 - localStorage 대체 사용", err);
        safeLocalStorageSet(fallbackKey(key), JSON.stringify(value));
      }
    }

    async function idbGet(key){
      try{
        const db = await withTimeout(openIDB(), 2500, "IndexedDB 열기");
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readonly");
          const req = tx.objectStore(IDB_STORE).get(key);
          req.onsuccess = () => { db.close(); resolve(req.result); };
          req.onerror = () => { db.close(); reject(req.error); };
        });
      } catch (err){
        console.warn("IndexedDB 읽기 실패 - localStorage 대체 사용", err);
        const raw = safeLocalStorageGet(fallbackKey(key));
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }
    }

    /**
     * 한글 호환 자모(compatibility jamo)로 분해된 문자열을 정규화하여
     * 완성형 한글(NFC)로 조합합니다. 예: 'ㅂㅕㄹ' → '별'.
     * 자모의 배열이 올바른 초성-중성-(종성) 조합을 이루지 못할 경우에는
     * 해당 문자를 그대로 반환합니다.
     * @param {string} str 입력 문자열
     * @returns {string} 조합된 문자열
     */
    function normalizeHangulString(str){
      if (!str) return "";
      // 한글 초성, 중성, 종성 표. 초성과 종성은 일부가 겹칩니다.
      const CHO = [
        "ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"
      ];
      const JUNG = [
        "ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"
      ];
      // 종성 목록에는 빈 문자열(없음) 자리도 포함되어야 합니다.
      const JONG = [
        "", "ㄱ", "ㄲ", "ㄳ", "ㄴ", "ㄵ", "ㄶ", "ㄷ", "ㄹ", "ㄺ", "ㄻ", "ㄼ", "ㄽ", "ㄾ", "ㄿ", "ㅀ", "ㅁ", "ㅂ", "ㅄ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"
      ];
      let result = "";
      let i = 0;
      const chars = Array.from(str);
      while (i < chars.length){
        const ch = chars[i];
        const choIndex = CHO.indexOf(ch);
        if (choIndex >= 0 && i + 1 < chars.length){
          const next = chars[i + 1];
          const jungIndex = JUNG.indexOf(next);
          if (jungIndex >= 0){
            // 기본적으로 종성은 없음(0)
            let jongIndex = 0;
            // 세 번째 자모를 종성으로 사용할 수 있는지 확인
            if (i + 2 < chars.length){
              const possibleJong = chars[i + 2];
              const pjIdx = JONG.indexOf(possibleJong);
              if (pjIdx > 0){
                jongIndex = pjIdx;
                i += 3;
              } else {
                i += 2;
              }
            } else {
              i += 2;
            }
            const code = 0xac00 + (choIndex * 21 * 28) + (jungIndex * 28) + jongIndex;
            result += String.fromCharCode(code);
            continue;
          }
        }
        // 자모 조합이 아니면 그대로 추가
        result += ch;
        i++;
      }
      return result;
    }

    function normalizeUrl(url){
      const v = safe(url);
      if (!v) return "";
      if (/^https?:\/\//i.test(v)) return v;
      if (v.startsWith("/")) return BASE_URL + v;
      return v;
    }

    function parseTimeToSeconds(value){
      const raw = safe(value).trim();
      if (!raw) return null;
      if (/^\d+(?:\.\d+)?$/.test(raw)) return Number(raw);
      const normalized = raw.replace(/시/g, ":").replace(/분/g, ":").replace(/초/g, "").replace(/\s+/g, "");
      const parts = normalized.split(":").filter(Boolean);
      if (!parts.length || parts.some(part => !/^\d+(?:\.\d+)?$/.test(part))) return null;
      let total = 0;
      for (const part of parts){
        total = total * 60 + Number(part);
      }
      return Number.isFinite(total) ? total : null;
    }

    function formatSecondsForUi(value){
      const seconds = Number(value);
      if (!Number.isFinite(seconds) || seconds < 0) return "";
      const whole = Math.floor(seconds);
      const h = Math.floor(whole / 3600);
      const m = Math.floor((whole % 3600) / 60);
      const s = whole % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function extractYoutubeVideoId(url){
      const raw = normalizeUrl(url);
      if (!raw) return "";
      try {
        const u = new URL(raw, location.href);
        const host = u.hostname.replace(/^www\./i, "").toLowerCase();
        if (host === "youtu.be") return safe(u.pathname.split("/").filter(Boolean)[0]);
        if (host.endsWith("youtube.com")){
          if (u.searchParams.get("v")) return safe(u.searchParams.get("v"));
          const parts = u.pathname.split("/").filter(Boolean);
          if (["embed", "shorts", "live", "v"].includes(parts[0])) return safe(parts[1]);
        }
      } catch (_) {}
      return "";
    }

    function isYoutubeVideoUrl(url){
      return !!extractYoutubeVideoId(url);
    }

    function buildYoutubeEmbedUrl(url, options = {}){
      const videoId = extractYoutubeVideoId(url);
      if (!videoId) return "";
      const params = new URLSearchParams();
      params.set("autoplay", options.autoPlay ? "1" : "0");
      params.set("controls", "1");
      params.set("playsinline", "1");
      params.set("rel", "0");
      params.set("modestbranding", "1");
      params.set("fs", "1");
      const start = Number(options.start);
      const end = Number(options.end);
      if (Number.isFinite(start) && start >= 0){
        params.set("start", String(Math.max(0, Math.floor(start))));
      }
      if (Number.isFinite(end) && end >= 0){
        params.set("end", String(Math.max(0, Math.ceil(end))));
      }
      return `https://www.youtube-nocookie.com/embed/${encodeURIComponent(videoId)}?${params.toString()}`;
    }

    function isRangeMatch(inputStart, inputEnd, rowStart, rowEnd){
      const hasInputStart = Number.isFinite(inputStart);
      const hasInputEnd = Number.isFinite(inputEnd);
      const hasRowStart = Number.isFinite(rowStart);
      const hasRowEnd = Number.isFinite(rowEnd);
      if (!hasInputStart && !hasInputEnd) return true;
      if (!hasRowStart && !hasRowEnd) return false;
      const effectiveInputStart = hasInputStart ? inputStart : inputEnd;
      const effectiveInputEnd = hasInputEnd ? inputEnd : inputStart;
      const effectiveRowStart = hasRowStart ? rowStart : rowEnd;
      const effectiveRowEnd = hasRowEnd ? rowEnd : rowStart;
      if (!Number.isFinite(effectiveInputStart) || !Number.isFinite(effectiveInputEnd) || !Number.isFinite(effectiveRowStart) || !Number.isFinite(effectiveRowEnd)) return false;
      const left = Math.max(Math.min(effectiveInputStart, effectiveInputEnd), Math.min(effectiveRowStart, effectiveRowEnd));
      const right = Math.min(Math.max(effectiveInputStart, effectiveInputEnd), Math.max(effectiveRowStart, effectiveRowEnd));
      return right >= left;
    }

    function calcRangeDistance(inputStart, inputEnd, rowStart, rowEnd){
      const hasInputStart = Number.isFinite(inputStart);
      const hasInputEnd = Number.isFinite(inputEnd);
      const hasRowStart = Number.isFinite(rowStart);
      const hasRowEnd = Number.isFinite(rowEnd);
      if (!hasInputStart && !hasInputEnd) return 0;
      const a = hasInputStart ? inputStart : inputEnd;
      const b = hasInputEnd ? inputEnd : inputStart;
      const c = hasRowStart ? rowStart : rowEnd;
      const d = hasRowEnd ? rowEnd : rowStart;
      if (![a,b,c,d].every(Number.isFinite)) return Number.MAX_SAFE_INTEGER;
      return Math.abs(a - c) + Math.abs(b - d);
    }

    function shuffleArray(arr){
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function hashString(value){
      const str = String(value ?? "");
      let hash = 2166136261;
      for (let i = 0; i < str.length; i++){
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function makeExampleShuffleKey(item){
      return `${safe(item.groupId)}|${safe(item.word)}|${safe(item.text)}|${safe(item.video)}`;

    function applyDeterministicShuffleOrder(){
      if (groupShuffleSeed !== null){
        filteredGroups.sort((a, b) => {
          const diff = hashString(`${groupShuffleSeed}|${safe(a.id)}`) - hashString(`${groupShuffleSeed}|${safe(b.id)}`);
          return diff || safe(a.word).localeCompare(safe(b.word), "ko") || String(a.id).localeCompare(String(b.id), "ko");
        });
      }

      if (exampleShuffleSeed !== null){
        filteredExamplePool.sort((a, b) => {
          const diff = hashString(`${exampleShuffleSeed}|${makeExampleShuffleKey(a)}`) - hashString(`${exampleShuffleSeed}|${makeExampleShuffleKey(b)}`);
          return diff
            || safe(a.word).localeCompare(safe(b.word), "ko")
            || safe(a.text).localeCompare(safe(b.text), "ko")
            || String(a.groupId).localeCompare(String(b.groupId), "ko");
        });
      }
    }

    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++){
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"'){
          if (inQuotes && next === '"'){
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes){
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes){
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }

      if (cell.length || row.length){
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function stripHeaderShortcutToken(text){
      return safe(text)
        .replace(/^\uFEFF/, "")
        .replace(/[\r\n]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\s+[A-Z]$/i, "")
        .replace(/([가-힣0-9])([A-Z])$/i, "$1")
        .trim();
    }

    function sanitizeHeaderRaw(value){
      const raw = safe(value).replace(/^\uFEFF/, "");
      if (!raw) return "";
      const compact = raw.replace(/[\r\n]+/g, " ").replace(/\s+/g, " ").trim();
      const withoutShortcut = stripHeaderShortcutToken(compact);
      return withoutShortcut || compact;
    }

    function mapHeaderKey(key, index){
      const raw = safe(key).replace(/^\uFEFF/, "");
      const compact = raw.replace(/[\r\n]+/g, " ").replace(/\s+/g, " ").trim();
      const cleaned = sanitizeHeaderRaw(raw);
      const compactNoSpace = compact.replace(/\s+/g, "");
      const cleanedNoSpace = cleaned.replace(/\s+/g, "");
      if (HEADER_ALIASES[raw]) return HEADER_ALIASES[raw];
      if (HEADER_ALIASES[compact]) return HEADER_ALIASES[compact];
      if (HEADER_ALIASES[cleaned]) return HEADER_ALIASES[cleaned];
      if (HEADER_ALIASES[compactNoSpace]) return HEADER_ALIASES[compactNoSpace];
      if (HEADER_ALIASES[cleanedNoSpace]) return HEADER_ALIASES[cleanedNoSpace];
      if (!cleaned) return `__col_${index}`;
      return cleaned;
    }

    function rowsMatrixToObjects(matrix){
      if (!matrix.length) return [];
      const first = matrix[0] || [];
      const second = matrix[1] || [];
      const aliasHits = second.reduce((acc, value) => acc + (HEADER_ALIASES[safe(value)] ? 1 : 0), 0);
      const hasAliasRow = aliasHits >= 4;
      const width = Math.max(first.length, second.length, ...matrix.map(row => row.length));
      const headers = Array.from({ length: width }, (_, idx) => {
        const primary = mapHeaderKey(first[idx], idx);
        if (!primary.startsWith("__col_")) return primary;
        if (hasAliasRow){
          return mapHeaderKey(second[idx], idx);
        }
        return primary;
      });

      const startRow = hasAliasRow ? 2 : 1;
      return matrix.slice(startRow)
        .filter(row => row.some(cell => safe(cell)))
        .map(row => {
          const obj = {};
          headers.forEach((header, idx) => {
            obj[header] = safe(row[idx]);
          });
          return obj;
        });
    }

    function csvToObjects(text){
      const matrix = parseCSV(text);
      return rowsMatrixToObjects(matrix);
    }

    function scoreSheetMatrix(matrix){
      if (!Array.isArray(matrix) || !matrix.length) return -1;
      const first = matrix[0] || [];
      const second = matrix[1] || [];
      const headerScore = [...first, ...second].reduce((acc, value) => {
        const compact = safe(value).replace(/[\r\n]+/g, " ").replace(/\s+/g, "").trim();
        const cleaned = sanitizeHeaderRaw(value).replace(/\s+/g, "");
        return acc + (HEADER_ALIASES[safe(value)] || HEADER_ALIASES[compact] || HEADER_ALIASES[cleaned] ? 1 : 0);
      }, 0);
      const dataScore = matrix.slice(1, 8).reduce((acc, row) => acc + (row.some(cell => safe(cell)) ? 1 : 0), 0);
      return headerScore * 10 + dataScore;
    }

    function xlsxArrayBufferToObjects(buffer){
      const workbook = XLSX.read(buffer, { type: "array" });
      const preferredNames = ["DB", "db", "Data", "DATA", workbook.SheetNames[0]].filter(Boolean);
      let best = { score: -1, rows: [], name: "" };

      for (const sheetName of workbook.SheetNames){
        const sheet = workbook.Sheets[sheetName];
        if (!sheet) continue;
        const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        const score = scoreSheetMatrix(matrix) + (preferredNames.includes(sheetName) ? 2 : 0);
        if (score > best.score){
          best = { score, rows: rowsMatrixToObjects(matrix), name: sheetName };
        }
      }

      return best.rows || [];
    }

    async function parseFileByNameAndBuffer(name, buffer){
      const lower = name.toLowerCase();
      if (lower.endsWith(".xlsx")){
        await ensureXlsxAvailable();
        if (typeof XLSX === "undefined"){
          throw new Error("XLSX 라이브러리를 불러오지 못했습니다.");
        }
        return xlsxArrayBufferToObjects(buffer);
      }
      const text = new TextDecoder("utf-8").decode(buffer);
      return csvToObjects(text);
    }

    function extractWordParts(rawExpression, explicitDefinition = ""){
      const raw = safe(rawExpression);
      let definition = safe(explicitDefinition);
      if (!raw) return { word: "", definition };
      const match = raw.match(/^(.*?)\s*뜻풀이\s*(.*)$/);
      if (match){
        const word = safe(match[1]);
        if (!definition) definition = safe(match[2]);
        return { word: word || raw, definition };
      }
      return { word: raw, definition };
    }

      const clipInfo = getRowClipInfo(row);

      return {
        __rowIndex: Number.isInteger(row.__rowIndex) ? row.__rowIndex : -1,
        sourceId,
        sourceName,
        word,
        wordNorm: normalizeHangulString(word).toLowerCase(),
        definition,
        definitionNorm: normalizeHangulString(definition).toLowerCase(),
        category,
        sourceUrl: buildSourceUrl(sourceId, pickValue(row, ["sourceUrl", "원문", "원문페이지", "pageUrl", "url"])),
        wordVideo: normalizeUrl(pickValue(row, ["headwordVideo", "표제어영상", "표제어 영상", "wordVideo", "영상"])),
        wordSignImage: normalizeUrl(pickValue(row, ["signTextImage", "표제어수어문자", "표제어 수어문자", "wordSignImage"])),
        handShapeImages,
        exampleText: pickValue(row, ["translation", "용례번역문", "용례 번역문", "exampleText", "번역문"]),
        exampleVideo: normalizeUrl(pickValue(row, ["exampleVideo", "용례영상", "용례 영상"])),
        exampleSignImage: normalizeUrl(pickValue(row, ["exampleSignTextImage", "용례수어문자", "용례 수어문자", "exampleSignImage"])),
        // 입 모양과 부가정보를 추가합니다.
        mouthVideo,
        extraInfo,
        memo: pickValue(row, ["메모", "memo", "notes"]),
        wordClipStartRaw: clipInfo.wordStartRaw,
        wordClipEndRaw: clipInfo.wordEndRaw,
        exampleClipStartRaw: clipInfo.exampleStartRaw,
        exampleClipEndRaw: clipInfo.exampleEndRaw,
        wordClipStart: clipInfo.wordStart,
        wordClipEnd: clipInfo.wordEnd,
        exampleClipStart: clipInfo.exampleStart,
        exampleClipEnd: clipInfo.exampleEnd,
        variantLabel,
        isVariant: variantLabel && variantLabel !== "표제어"
      };
    }

    function buildSourceUrl(id, rawUrl){
      const url = normalizeUrl(rawUrl);
      if (url) return url;
      const idText = safe(id);
      if (/^\d+$/.test(idText)) return `${BASE_URL}/kslserv/sign/signWord.do?signWordId=${idText}`;
      return "";
    }

    function buildGroups(dataRows){
      const normalizedRows = dataRows
        .map(normalizeDataRow)
        .filter(Boolean);

      const groupsByKey = new Map();
      const looseLookup = new Map();
      const baseGroupsBySourceId = new Map();
      const baseGroupsBySourceUrl = new Map();

      function makeStableGroupId(row){
        const sid = safe(row.sourceId);
        const surl = safe(row.sourceUrl);
        const keySource = sid ? `sid:${sid}` : `url:${surl}`;
        const sig = [safe(row.word), safe(row.category), safe(row.definition)].join("||");
        return `${keySource}::${makeDataHash(sig)}`;
      }

      function createGroup(row, key){
        const initialRowIndex = Number.isInteger(row.__rowIndex) ? row.__rowIndex : -1;
        const initialIndices = initialRowIndex >= 0 ? [initialRowIndex] : [];
        return {
          id: makeStableGroupId(row),
          legacyKey: key,
          sourceId: row.sourceId,
          sourceName: row.sourceName || "한국수어누리사전",
          word: row.word,
          wordNorm: row.wordNorm,
          wordSearchBlob: row.wordNorm,
          category: row.category,
          sourceUrl: row.sourceUrl,
          definition: row.definition,
          definitionNorm: row.definitionNorm,
          wordVideo: row.wordVideo,
          wordSignImage: row.wordSignImage,
          handShapeImages: [...row.handShapeImages],
          handShapeImage: row.handShapeImages[0] || "",
          primaryRowIndex: initialRowIndex,
          rowIndices: [...initialIndices],
          baseRowIndices: [...initialIndices],
          examples: [],
          exampleNorms: [],
          exampleSearchBlob: "",
          searchBlob: row.wordNorm,
          variants: [],
          variantWords: [],
          variantNorms: [],
          // 입 모양 비디오와 부가정보를 그룹에 저장합니다.
          mouthVideo: row.mouthVideo || "",
          extraInfo: row.extraInfo || "",
          wordClipStartRaw: row.wordClipStartRaw || "",
          wordClipEndRaw: row.wordClipEndRaw || "",
          wordClipStart: row.wordClipStart,
          wordClipEnd: row.wordClipEnd
        };
      }

      function mergeGroupMedia(group, row){
        const rowIndex = Number.isInteger(row.__rowIndex) ? row.__rowIndex : -1;
        if (!group.wordVideo && row.wordVideo) group.wordVideo = row.wordVideo;
        if (!group.wordSignImage && row.wordSignImage) group.wordSignImage = row.wordSignImage;
        if (!group.sourceUrl && row.sourceUrl) group.sourceUrl = row.sourceUrl;
        if (!group.definition && row.definition){
          group.definition = row.definition;
          group.definitionNorm = row.definitionNorm;
        }
        if (!group.category && row.category) group.category = row.category;
        if (!group.sourceName && row.sourceName) group.sourceName = row.sourceName;
        group.handShapeImages = [...new Set([...(group.handShapeImages || []), ...(row.handShapeImages || [])])];
        group.handShapeImage = group.handShapeImages[0] || "";
        if (rowIndex >= 0){
          if (!group.rowIndices.includes(rowIndex)) group.rowIndices.push(rowIndex);
          if (!group.baseRowIndices.includes(rowIndex)) group.baseRowIndices.push(rowIndex);
          if (!(Number.isInteger(group.primaryRowIndex) && group.primaryRowIndex >= 0)) group.primaryRowIndex = rowIndex;
        }

      // 입 모양 비디오와 부가정보가 비어있을 경우 채웁니다.
      if (!group.mouthVideo && row.mouthVideo) group.mouthVideo = row.mouthVideo;
      if (!group.extraInfo && row.extraInfo) group.extraInfo = row.extraInfo;
      if (!safe(group.wordClipStartRaw) && safe(row.wordClipStartRaw)) group.wordClipStartRaw = row.wordClipStartRaw;
      if (!safe(group.wordClipEndRaw) && safe(row.wordClipEndRaw)) group.wordClipEndRaw = row.wordClipEndRaw;
      if (!Number.isFinite(group.wordClipStart) && Number.isFinite(row.wordClipStart)) group.wordClipStart = row.wordClipStart;
      if (!Number.isFinite(group.wordClipEnd) && Number.isFinite(row.wordClipEnd)) group.wordClipEnd = row.wordClipEnd;
      }

      function addExample(group, row){
        if (!(row.exampleText || row.exampleVideo || row.exampleSignImage)) return;
        const textNorm = normalizeHangulString(row.exampleText || "").toLowerCase();
        const rowIndex = Number.isInteger(row.__rowIndex) ? row.__rowIndex : -1;
        const key = [row.exampleText, row.exampleVideo, row.exampleSignImage].join("||");
        if (group.examples.some(ex => ex._key === key)) return;
        group.examples.push({
          text: row.exampleText,
          textNorm,
          video: row.exampleVideo,
          signImage: row.exampleSignImage,
          rowIndex,
          clipStartRaw: row.exampleClipStartRaw || "",
          clipEndRaw: row.exampleClipEndRaw || "",
          clipStart: row.exampleClipStart,
          clipEnd: row.exampleClipEnd,
          _key: key
        });
        if (rowIndex >= 0 && !group.rowIndices.includes(rowIndex)) group.rowIndices.push(rowIndex);
        if (textNorm) group.exampleNorms.push(textNorm);
      }

      function addVariant(group, row){
        const entry = {
          label: row.variantLabel || `변이형${group.variants.length + 1}`,
          word: row.word,
          wordNorm: row.wordNorm,
          video: row.wordVideo,
          signImage: row.wordSignImage,
          handShapeImages: [...(row.handShapeImages || [])]
        };

        const sameIdentity = (item) => {
          const itemLabel = safe(item?.label || "");
          const itemWord = safe(item?.word || group.word || "");
          const entryLabel = safe(entry.label || "");
          const entryWord = safe(entry.word || group.word || "");
          return itemLabel === entryLabel && itemWord === entryWord;
        };

        const existing = group.variants.find(sameIdentity) || null;
        if (existing){
          if (!existing.video && entry.video) existing.video = entry.video;
          if (!existing.signImage && entry.signImage) existing.signImage = entry.signImage;
          if (!existing.word && entry.word) existing.word = entry.word;
          if (!existing.wordNorm && entry.wordNorm) existing.wordNorm = entry.wordNorm;
          existing.handShapeImages = [...new Set([...(existing.handShapeImages || []), ...(entry.handShapeImages || [])])];
        } else {
          const variantKey = [entry.label, entry.word, entry.video, entry.signImage, (entry.handShapeImages || []).join("|")].join("||");
          if (!group.variants.some(item => [item.label, item.word, item.video, item.signImage, (item.handShapeImages || []).join("|")].join("||") === variantKey)){
            group.variants.push(entry);
          }
        }

        if (entry.wordNorm && entry.wordNorm !== group.wordNorm && !group.variantNorms.includes(entry.wordNorm)){
          group.variantNorms.push(entry.wordNorm);
          group.variantWords.push(entry.word);
        }
      }

      function makeLooseKeys(row){
        const keys = [];
        const source = safe(row.sourceUrl) || buildSourceUrl(row.sourceId, "");
        const category = safe(row.category);
        const word = safe(row.word);
        const definition = safe(row.definition);
        if (source && word && category) keys.push(`SRCWORD::${source}||${word}||${category}`);
        if (source && word) keys.push(`SRCWORDONLY::${source}||${word}`);
        if (row.sourceId && word && category) keys.push(`IDWORD::${row.sourceId}||${word}||${category}`);
        if (row.sourceId && word) keys.push(`IDWORDONLY::${row.sourceId}||${word}`);
        if (source && definition && category) keys.push(`SRCDEF::${source}||${definition}||${category}`);
        if (row.sourceId && definition && category) keys.push(`IDDEF::${row.sourceId}||${definition}||${category}`);
        return [...new Set(keys.filter(Boolean))];
      }

      function registerLooseKeys(group, row){
        makeLooseKeys(row).forEach(key => {
          if (!looseLookup.has(key)) looseLookup.set(key, []);
          const arr = looseLookup.get(key);
          if (!arr.includes(group)) arr.push(group);
        });
      }

      function registerBaseRefs(group, row){
        const sid = safe(row.sourceId);
        const surl = safe(row.sourceUrl);
        if (sid){
          if (!baseGroupsBySourceId.has(sid)) baseGroupsBySourceId.set(sid, []);
          const arr = baseGroupsBySourceId.get(sid);
          if (!arr.includes(group)) arr.push(group);
        }
        if (surl){
          if (!baseGroupsBySourceUrl.has(surl)) baseGroupsBySourceUrl.set(surl, []);
          const arr = baseGroupsBySourceUrl.get(surl);
          if (!arr.includes(group)) arr.push(group);
        }
      }

      for (const row of normalizedRows.filter(item => !item.isVariant)){
        const baseKey = [row.sourceUrl || row.sourceId, row.word, row.category, row.definition].join("||");
        let group = groupsByKey.get(baseKey);
        if (!group){
          group = createGroup(row, baseKey);
          groupsByKey.set(baseKey, group);
        }
        mergeGroupMedia(group, row);
        addExample(group, row);
        registerLooseKeys(group, row);
        registerBaseRefs(group, row);
      }

      for (const row of normalizedRows.filter(item => item.isVariant)){
        const byId = baseGroupsBySourceId.get(safe(row.sourceId)) || [];
        const byUrl = baseGroupsBySourceUrl.get(safe(row.sourceUrl)) || [];
        const looseCandidates = makeLooseKeys(row).flatMap(key => looseLookup.get(key) || []);
        const candidates = [...new Set([...byId, ...byUrl, ...looseCandidates])];
        let group = candidates.find(item => safe(item.word) === safe(row.word) && safe(item.category) === safe(row.category))
          || candidates.find(item => safe(item.category) === safe(row.category) && safe(item.definition) === safe(row.definition))
          || candidates.find(item => safe(item.sourceId) === safe(row.sourceId))
          || candidates[0]
          || null;
        if (!group){
          console.warn("변이형 기준 표제어를 찾지 못해 건너뜀", row);
          continue;
        }
        addVariant(group, row);
      }

      const out = [...groupsByKey.values()].sort((a, b) => a.word.localeCompare(b.word, "ko"));
      out.forEach(group => {
        group.exampleSearchBlob = group.exampleNorms.join("\n");
        group.wordSearchBlob = [group.wordNorm].filter(Boolean).join("\n");
        group.searchBlob = [group.wordNorm, group.exampleSearchBlob, group.definitionNorm].filter(Boolean).join("\n");
      });
      return out;
    }

    function buildExamplePool(groupsData){
      const pool = [];
      groupsData.forEach(group => {
        group.examples.forEach((ex, exIdx) => {
          const wordNorm = group.wordNorm || normalizeHangulString(group.word).toLowerCase();
          const textNorm = ex.textNorm || normalizeHangulString(ex.text || "").toLowerCase();
          pool.push({
            groupId: group.id,
            sourceId: group.sourceId,
            sourceName: group.sourceName || "한국수어누리사전",
            word: group.word,
            wordNorm,
            category: group.category,
            sourceUrl: group.sourceUrl,
            groupWordVideo: group.wordVideo,
            groupWordSignImage: group.wordSignImage,
            groupHandShapeImages: group.handShapeImages,
            groupHandShapeImage: group.handShapeImage,
            groupDefinition: group.definition,
            exampleIndex: exIdx,
            rowIndex: Number.isInteger(ex.rowIndex) ? ex.rowIndex : -1,
            text: ex.text || "",
            textNorm,
            searchBlob: [wordNorm, textNorm].filter(Boolean).join("\n"),
            video: ex.video || "",
            signImage: ex.signImage || "",
            clipStartRaw: ex.clipStartRaw || "",
            clipEndRaw: ex.clipEndRaw || "",
            clipStart: ex.clipStart,
            clipEnd: ex.clipEnd
          });
        });
      });
      return pool;
    }

    function rebuildFastIndexes(){
      groupById = new Map(groups.map(g => [String(g.id), g]));

      groupsByCategory = new Map();
      examplesByCategory = new Map();
      groupsBySource = new Map();
      examplesBySource = new Map();
      groupsByCategory.set("", groups);
      examplesByCategory.set("", examplePool);
      groupsBySource.set("", groups);
      examplesBySource.set("", examplePool);

      groups.forEach(g => {
        const key = safe(g.category);
        if (!groupsByCategory.has(key)) groupsByCategory.set(key, []);
        groupsByCategory.get(key).push(g);

        const sourceKey = safe(g.sourceName);
        if (!groupsBySource.has(sourceKey)) groupsBySource.set(sourceKey, []);
        groupsBySource.get(sourceKey).push(g);
      });

      examplePool.forEach(item => {
        const key = safe(item.category);
        if (!examplesByCategory.has(key)) examplesByCategory.set(key, []);
        examplesByCategory.get(key).push(item);

        const sourceKey = safe(item.sourceName);
        if (!examplesBySource.has(sourceKey)) examplesBySource.set(sourceKey, []);
        examplesBySource.get(sourceKey).push(item);
      });

      wordSuggestionIndex = [];
      groups.forEach(g => {
        const cleaned = safe(g.word);
        const norm = normalizeHangulString(cleaned).toLowerCase();
        if (!cleaned || !norm) return;
        wordSuggestionIndex.push({
          type: "word",
          text: cleaned,
          word: cleaned,
          baseWord: g.word,
          id: g.id,
          sourceId: g.sourceId,
          norm,
          len: cleaned.length,
          isVariant: false,
          variantLabel: "표제어"
        });
      });

      suggestionCacheKey = "";
      suggestionCacheItems = [];
      renderedSuggestionItems = [];

      exampleSuggestionIndex = examplePool.map(item => ({
        type: "example",
        text: item.text,
        word: item.word,
        id: item.groupId,
        sourceId: item.sourceId,
        norm: item.textNorm || "",
        len: (item.text || "").length || item.word.length,
        textLen: (item.text || "").length
      }));
    }

    function buildBalancedExamplePool(items){
      const map = new Map();
      items.forEach(item => {
        if (!map.has(item.word)) map.set(item.word, []);
        map.get(item.word).push(item);
      });

      const words = [...map.keys()].sort((a,b) => a.localeCompare(b, "ko"));
      const queues = words.map(word => [...map.get(word)]);
      const result = [];

      let added = true;
      while (added){
        added = false;
        for (const q of queues){
          if (q.length){
            result.push(q.shift());
            added = true;
          }
        }
      }
      return result;
    }

    async function saveDataCache(sourceName){
      await idbSet(CACHE_KEYS.DATA, rows);
      await idbSet(CACHE_KEYS.META, {
        sourceName,
        savedAt: Date.now()
      });
    }

    async function restoreDataCache(){
      const cachedRows = await idbGet(CACHE_KEYS.DATA);
      const meta = await idbGet(CACHE_KEYS.META);
      if (!cachedRows) return null;
      return { rows: cachedRows, meta };

      await idbSet(CACHE_KEYS.PRESETS, selectionPresets);

    async function saveNotesCache(){
      await idbSet(CACHE_KEYS.NOTES, notesByKey);
      await idbSet(`${CACHE_KEYS.NOTES}:${syncRoomKey}`, notesByKey);
    }

    function buildGroupNoteKey(groupId){
      const id = safe(groupId);
      return id ? `group:${id}` : "";
    }

    function buildRowNoteKey(rowIndex){
      const idx = Number(rowIndex);
      return Number.isInteger(idx) && idx >= 0 ? `row:${idx}` : "";
    }

    function extractLegacyExampleGroupId(noteKey){
      const raw = safe(noteKey);
      if (!raw.startsWith("example:")) return "";
      const body = raw.slice("example:".length);
      const pipeIndex = body.indexOf("|");
      return safe(pipeIndex >= 0 ? body.slice(0, pipeIndex) : body);
    }

    function mergeNoteText(baseText, extraText){
      const base = safe(baseText);
      const extra = safe(extraText);
      if (!base) return extra;
      if (!extra) return base;
      if (base === extra) return base;
      const parts = [];
      const seen = new Set();
      [base, extra].forEach(block => {
        if (!block) return;
        if (seen.has(block)) return;
        seen.add(block);
        parts.push(block);
      });
      return parts.join("\n\n");
    }

    function migrateLegacyExampleNotes(){
      if (!notesByKey || typeof notesByKey !== "object") return false;
      let changed = false;
      const grouped = new Map();

      Object.entries(notesByKey).forEach(([key, value]) => {
        const noteText = safe(value);
        if (!noteText) return;
        const legacyGroupId = extractLegacyExampleGroupId(key);
        if (!legacyGroupId) return;
        const groupKey = buildGroupNoteKey(legacyGroupId);
        grouped.set(groupKey, mergeNoteText(grouped.get(groupKey) || "", noteText));
        delete notesByKey[key];
        changed = true;
      });

      grouped.forEach((noteText, groupKey) => {
        const merged = mergeNoteText(notesByKey[groupKey] || "", noteText);
        if (merged !== safe(notesByKey[groupKey] || "")){
          notesByKey[groupKey] = merged;
          changed = true;
        }
      });

      return changed;
    }

    function getGroupPrimaryRowIndex(group){
      const idx = Number(group?.primaryRowIndex);
      return Number.isInteger(idx) && idx >= 0 ? idx : -1;
    }

    function getCurrentExampleRowIndex(){
      const idx = Number(getCurrentPoolItem()?.rowIndex);
      return Number.isInteger(idx) && idx >= 0 ? idx : -1;
    }

    function getCurrentEntityRowIndex(){
      if (isExampleMode()){
        const exampleRowIndex = getCurrentExampleRowIndex();
        if (exampleRowIndex >= 0) return exampleRowIndex;
      }
      return getGroupPrimaryRowIndex(getCurrentGroup());
    }

    function migrateLegacyNotesToRowKeys(){
      if (!notesByKey || typeof notesByKey !== "object") return false;
      if (!groups.length || !rows.length) return false;
      let changed = false;
      const migrated = { ...notesByKey };

      Object.entries(notesByKey).forEach(([key, value]) => {
        const noteText = safe(value);
        if (!noteText || key.startsWith("row:")) return;

        let rowIndex = -1;
        if (key.startsWith("group:")){
          const groupId = safe(key.slice("group:".length));
          rowIndex = getGroupPrimaryRowIndex(groupById.get(groupId) || null);
        } else if (key.startsWith("example:")){
          const groupId = extractLegacyExampleGroupId(key);
          const group = groupById.get(groupId) || null;
          rowIndex = Number(group?.examples?.[0]?.rowIndex ?? -1);
          if (!(Number.isInteger(rowIndex) && rowIndex >= 0)){
            rowIndex = getGroupPrimaryRowIndex(group);
          }
        }

        if (!(Number.isInteger(rowIndex) && rowIndex >= 0)) return;
        const rowKey = buildRowNoteKey(rowIndex);
        migrated[rowKey] = mergeNoteText(migrated[rowKey] || "", noteText);
        delete migrated[key];
        changed = true;
      });

      if (changed){
        notesByKey = migrated;
      }
      return changed;
    }

    async function loadNotesCache(){
      notesByKey = (await idbGet(`${CACHE_KEYS.NOTES}:${syncRoomKey}`)) || (await idbGet(CACHE_KEYS.NOTES)) || {};
      if (migrateLegacyExampleNotes()){
        await saveNotesCache();
      }
      updateNoteButtons();
    }

    function getCurrentEntityKey(){
      return buildRowNoteKey(getCurrentEntityRowIndex());
    }

    function getCurrentEntityLabel(){
      const currentItem = getCurrentPoolItem();
      const group = getCurrentGroup();
      const word = safe(group?.word || currentItem?.word || "");
      if (isExampleMode() && currentItem){
        const exampleNumber = Number(currentItem.exampleIndex) + 1;
        return word ? `${word} · 용례 ${exampleNumber}` : `용례 ${exampleNumber}`;
      }
      return word || "표제어";
    }

        currentMode,

    function rememberUndoSnapshot(){

      const snap = undoSnapshot;
      redoSnapshot = createUndoSnapshot();
      undoSnapshot = null;
      updateUndoButton();
      currentMode = snap.currentMode || "Q";
      playbackMode = snap.playbackMode || playbackMode;
      els.searchInput.value = snap.searchValue || "";
      els.searchScopeSelect.value = snap.searchScope || "word";

      updateLiveSyncButton();

      updateModeButtons(currentMode);
      applyVideoLoopState();
      updatePlaybackButton();
      render(false);
      await saveState();

    async function redoLastAction(){
      if (!redoSnapshot) {
        showOverlay("다시 실행할 항목이 없습니다", 900);
        return;
      }
      const snap = redoSnapshot;
      redoSnapshot = null;
      undoSnapshot = createUndoSnapshot();
      currentMode = snap.currentMode || "Q";
      playbackMode = snap.playbackMode || playbackMode;
      els.searchInput.value = snap.searchValue || "";
      els.searchScopeSelect.value = snap.searchScope || "word";
      searchIdMode = !!snap.searchIdMode;
      syncSearchModeWithScope();
      els.categorySelect.value = snap.categoryValue || "";
      if (els.sourceSelect) els.sourceSelect.value = snap.sourceValue || "";
      groupShuffleSeed = snap.groupShuffleSeed ?? null;
      exampleShuffleSeed = snap.exampleShuffleSeed ?? null;

    function triggerExcelBlobDownload(workbook, fileName){
      const safeName = safe(fileName || makeExportFileName()).trim() || "한국수어누리사전_편집본.xlsx";
      const wbout = XLSX.write(workbook, { bookType:"xlsx", type:"array" });
      const blob = new Blob([
        wbout
      ], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });

      if (window.navigator && typeof window.navigator.msSaveOrOpenBlob === "function"){
        window.navigator.msSaveOrOpenBlob(blob, safeName);
        return true;
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = safeName;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        try{ a.remove(); }catch(_){ }
        try{ URL.revokeObjectURL(url); }catch(_){ }
      }, 1000);
      return true;
    }

    async function downloadExcelFile(){
      if (window.matchMedia("(max-width: 1180px)").matches){
        showOverlay("PC 버전에서만 엑셀 다운로드가 가능합니다", 1200);
        return false;

      if (!rows.length){
        showOverlay("다운로드할 데이터가 없습니다", 1200);

      try{
        await ensureXlsxAvailable();
        if (typeof XLSX === "undefined"){
          showOverlay("엑셀 라이브러리를 불러오지 못했습니다", 1500);

        }
        const { headers, data } = buildExportRows();
        const aoa = [
          headers,
          ...data.map(row => headers.map(header => normalizeExcelCellValue(row?.[header])))
        ];
        const worksheet = XLSX.utils.aoa_to_sheet(aoa);

        XLSX.utils.book_append_sheet(workbook, worksheet, "DB");

    }

    function getFitVerticalZoomScale(){
      const { stageRect, drawHeight } = getRenderedImageMetrics();
      const fit = stageRect.height / Math.max(1, drawHeight);
      return clamp(fit, 1, 8);
    }

    function zoomImageFit(anchor = "center"){
      if (!canUseImageZoom()) return;
      const scale = getFitVerticalZoomScale();
      if (scale <= 1.01){
        resetImageZoom();
        return;
      }
      const { drawWidth } = getRenderedImageMetrics();
      imageZoom.scale = scale;
      const maxX = Math.max(0, (drawWidth * scale - drawWidth) / 2);
      imageZoom.x = anchor === "left" ? maxX : anchor === "right" ? -maxX : 0;
      imageZoom.y = 0;
      imageZoom.max = Math.max(4, scale);
      applyImageZoom();
    }

async function saveState(){

}

    function clamp(value, min, max){
      return Math.min(max, Math.max(min, value));
    }

    function canUseImageZoom(){
      return currentMode === "D"
        && els.mainImage
        && els.mainImage.style.display !== "none"
        && !!els.mainImage.getAttribute("src");
    }

    function getRenderedImageMetrics(){
      const stageRect = els.stage.getBoundingClientRect();
      const naturalW = els.mainImage.naturalWidth || stageRect.width || 1;
      const naturalH = els.mainImage.naturalHeight || stageRect.height || 1;
      const scale = Math.min(stageRect.width / naturalW, stageRect.height / naturalH) || 1;
      const drawWidth = naturalW * scale;
      const drawHeight = naturalH * scale;
      imageZoom.max = Math.max(4, clamp(stageRect.height / Math.max(1, drawHeight), 1, 8));
      return { stageRect, drawWidth, drawHeight };
    }

    function clampImageOffset(x, y, scale = imageZoom.scale){
      const { drawWidth, drawHeight } = getRenderedImageMetrics();
      const maxX = Math.max(0, (drawWidth * scale - drawWidth) / 2);
      const maxY = Math.max(0, (drawHeight * scale - drawHeight) / 2);
      return {
        x: clamp(x, -maxX, maxX),
        y: clamp(y, -maxY, maxY)
      };
    }

    function isImageGestureActive(){
      return canUseImageZoom() && (imageZoom.scale > 1.01 || imageZoom.panning || imageZoom.pinching);
    }

    function updateStageGestureState(){
      const disableTapZones = currentMode === "D" && !!els.mainImage.getAttribute("src") && (isMobileViewport() || canUseImageZoom());
      [els.tapPrevZone, els.tapNextZone].forEach(zone => {
        if (!zone) return;
        zone.style.pointerEvents = disableTapZones ? "none" : "auto";
        zone.style.opacity = disableTapZones ? "0" : "1";
      });
    }

    function applyImageZoom(){
      if (!canUseImageZoom()){
        imageZoom.scale = 1;
        imageZoom.x = 0;
        imageZoom.y = 0;
        imageZoom.panning = false;
        imageZoom.pinching = false;
        imageZoom.moved = false;
        els.mainImage.classList.remove("zoomable", "zoomed");
        els.mainImage.style.transform = "translate3d(0,0,0) scale(1)";
        updateStageGestureState();
        return;
      }

      els.mainImage.classList.add("zoomable");
      if (imageZoom.scale <= 1.01){
        imageZoom.scale = 1;
        imageZoom.x = 0;
        imageZoom.y = 0;
        els.mainImage.classList.remove("zoomed");
        els.mainImage.style.transform = "translate3d(0,0,0) scale(1)";
      } else {
        const clamped = clampImageOffset(imageZoom.x, imageZoom.y, imageZoom.scale);
        imageZoom.x = clamped.x;
        imageZoom.y = clamped.y;
        els.mainImage.classList.add("zoomed");
        els.mainImage.style.transform = `translate3d(${imageZoom.x}px, ${imageZoom.y}px, 0) scale(${imageZoom.scale})`;
      }
      updateStageGestureState();
      updateNoteButtons();
    }

    function resetImageZoom(){
      imageZoom.scale = 1;
      imageZoom.x = 0;
      imageZoom.y = 0;
      imageZoom.panning = false;
      imageZoom.pinching = false;
      imageZoom.moved = false;
      applyImageZoom();
    }

    function zoomImageAt(scale, clientX, clientY){
      if (!canUseImageZoom()) return;
      const nextScale = clamp(scale, imageZoom.min, Math.max(imageZoom.max, getFitVerticalZoomScale()));
      if (nextScale <= 1.01){
        resetImageZoom();
        return;
      }
      const { stageRect } = getRenderedImageMetrics();
      const centerX = stageRect.left + stageRect.width / 2;
      const centerY = stageRect.top + stageRect.height / 2;
      imageZoom.scale = nextScale;
      imageZoom.x = (centerX - clientX) * (nextScale - 1);
      imageZoom.y = (centerY - clientY) * (nextScale - 1);
      applyImageZoom();
    }

    function touchDistance(t1, t2){
      return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }

    function applyRestoredUIState(state){
      if (!state) return;
      if (state.currentMode && MODES[state.currentMode]) currentMode = state.currentMode;
      if (typeof state.currentIndex === "number") currentIndex = state.currentIndex;
      if (typeof state.currentPoolIndex === "number") currentPoolIndex = state.currentPoolIndex;
      pendingRestoreGroupId = safe(state.currentGroupId || "");
      pendingRestoreExampleToken = safe(state.currentExampleToken || "");
      if (typeof state.selectionResumeIndex === "number") selectionResumeIndex = Math.max(0, Number(state.selectionResumeIndex));
      if (typeof state.selectionResumePoolIndex === "number") selectionResumePoolIndex = Math.max(0, Number(state.selectionResumePoolIndex));
      if (state.playbackMode && PLAYBACK_MODES.includes(state.playbackMode)) playbackMode = state.playbackMode;
      if (Array.isArray(state.selectedGroupIds)){

    function decodeSelectionGroupId(value){
      const raw = safe(value);
      if (!raw) return "";
      try { return decodeURIComponent(raw); } catch { return raw; }
    }

    function findCanonicalGroupIdFromLegacy(rawGroupId){
      const raw = safe(rawGroupId);
      if (!raw) return "";
      if (groupById && groupById.has(String(raw))) return String(raw);

      const plain = raw.replace(/^g:/, "");
      const matchId = raw.match(/signWordId=(\d+)/i);
      const firstPart = safe(raw.split("||")[0] || "");
      const sourceId = safe(matchId?.[1] || (/^\d+$/.test(plain) ? plain : /^\d+$/.test(firstPart) ? firstPart : ""));
      const sourceUrl = safe(/^https?:/i.test(firstPart) ? firstPart : "");
      const parts = raw.split("||");
      const word = safe(parts[1] || "");
      const category = safe(parts[2] || "");
      const definition = safe(parts[3] || "");

      const pool = groups.filter(g => {
        if (sourceId) return safe(g.sourceId) === sourceId;
        if (sourceUrl) return safe(g.sourceUrl) === sourceUrl;
        return false;
      });
      const candidates = pool.length ? pool : groups;

      const exact = candidates.find(g =>
        (!sourceId || safe(g.sourceId) === sourceId) &&
        (!sourceUrl || safe(g.sourceUrl) === sourceUrl) &&
        (!word || safe(g.word) === word) &&
        (!category || safe(g.category) === category) &&
        (!definition || safe(g.definition) === definition)
      );
      if (exact) return String(exact.id);

      const byWordCat = candidates.find(g =>
        (!sourceId || safe(g.sourceId) === sourceId) &&
        (!sourceUrl || safe(g.sourceUrl) === sourceUrl) &&
        (!word || safe(g.word) === word) &&
        (!category || safe(g.category) === category)
      );
      if (byWordCat) return String(byWordCat.id);

      const byDefCat = candidates.find(g =>
        (!sourceId || safe(g.sourceId) === sourceId) &&
        (!sourceUrl || safe(g.sourceUrl) === sourceUrl) &&
        (!definition || safe(g.definition) === definition) &&
        (!category || safe(g.category) === category)
      );
      if (byDefCat) return String(byDefCat.id);

      if (sourceId){
        const byId = candidates.find(g => safe(g.sourceId) === sourceId);
        if (byId) return String(byId.id);
      }
      if (sourceUrl){
        const byUrl = candidates.find(g => safe(g.sourceUrl) === sourceUrl);
        if (byUrl) return String(byUrl.id);
      }

      const legacy = groups.find(g => safe(g.legacyKey) === raw);
      if (legacy) return String(legacy.id);

      return "";
    }

    function normalizeSelectionToken(token){
      const raw = safe(token);
      if (!raw) return "";
      if (raw.startsWith("e:")){
        const body = raw.slice(2);
        const sep = body.lastIndexOf("::");
        const encodedGroupId = sep >= 0 ? body.slice(0, sep) : body;
        const idxRaw = sep >= 0 ? body.slice(sep + 2) : "0";
        const groupId = decodeSelectionGroupId(encodedGroupId);
        const canonical = findCanonicalGroupIdFromLegacy(groupId);
        return canonical ? `e:${encodeURIComponent(canonical)}::${Number(idxRaw || 0) || 0}` : "";
      }
      const groupRaw = raw.startsWith("g:") ? decodeSelectionGroupId(raw.slice(2)) : raw;
      const canonical = findCanonicalGroupIdFromLegacy(groupRaw);
      return canonical ? `g:${encodeURIComponent(canonical)}` : "";
    }

    function parseSelectionToken(token){
      const raw = normalizeSelectionToken(token);
      if (!raw) return null;
      if (raw.startsWith("e:")){
        const body = raw.slice(2);
        const sep = body.lastIndexOf("::");
        const encodedGroupId = sep >= 0 ? body.slice(0, sep) : body;
        const idxRaw = sep >= 0 ? body.slice(sep + 2) : "0";
        const groupId = decodeSelectionGroupId(encodedGroupId);
        return { type:"example", token:raw, groupId:safe(groupId), exampleIndex: Number(idxRaw || 0) || 0 };
      }
      const encodedGroupId = raw.startsWith("g:") ? raw.slice(2) : raw;
      const groupId = decodeSelectionGroupId(encodedGroupId);
      return { type:"group", token:`g:${encodeURIComponent(groupId)}`, groupId:safe(groupId), exampleIndex:null };
    }

    function makeGroupSelectionToken(id){
      const gid = safe(id);
      return gid ? `g:${encodeURIComponent(gid)}` : "";
    }

    function makeExampleSelectionToken(itemOrGroupId, exampleIndex = null){
      if (itemOrGroupId && typeof itemOrGroupId === "object"){
        const gid = safe(itemOrGroupId.groupId);
        const idx = Number(itemOrGroupId.exampleIndex || 0) || 0;
        return gid ? `e:${encodeURIComponent(gid)}::${idx}` : "";
      }
      const gid = safe(itemOrGroupId);
      const idx = Number(exampleIndex || 0) || 0;
      return gid ? `e:${encodeURIComponent(gid)}::${idx}` : "";
    }

    function getSelectionEntries(){

      const item = findExampleBySelectionToken(token);

    }

    function compareSuggestionItems(a, b){
      const aDisplayLen = (a.type === "word" ? safe(a.word).length : safe(a.text).length) || a.len || 0;
      const bDisplayLen = (b.type === "word" ? safe(b.word).length : safe(b.text).length) || b.len || 0;
      return (aDisplayLen - bDisplayLen)
        || (a.score - b.score)
        || (((a.textLen ?? a.len) - (b.textLen ?? b.len)))
        || safe(a.word || a.text).localeCompare(safe(b.word || b.text), "ko")
        || safe(a.text).localeCompare(safe(b.text), "ko")
        || (a.type === b.type ? 0 : (a.type === "word" ? -1 : 1));
    }

    function ensureWordAssetState(group){
      const groupId = group?.id || "";
      if (activeWordAssetState.groupId !== groupId){

    function resetWordAssetState(groupId = ""){

    function buildWordAssetSignature(entry, fallbackWord = ""){
      if (!entry) return "";
      const url = safe(entry.url || entry.video || "");
      const sign = safe(entry.signImage || "");
      const hand = Array.isArray(entry.handShapeImages) ? entry.handShapeImages.filter(Boolean).join("|") : "";
      return [url, sign, hand].join("||");
    }

    function getEffectiveVariants(group){
      if (!group) return [];
      const explicit = Array.isArray(group.variants) ? group.variants.filter(Boolean) : [];

      const baseSignature = buildWordAssetSignature({
        url: group.wordVideo || "",
        signImage: group.wordSignImage || "",
        handShapeImages: [...(group.handShapeImages || [])],
        word: group.word || "",
        label: "표제어"
      }, group.word);

      const seen = new Set();
      const merged = [];
      explicit.forEach((entry, idx) => {
        const normalized = {
          label: safe(entry.label || `변이형${idx + 1}`),
          word: safe(entry.word || group.word || ""),
          video: safe(entry.video || entry.url || ""),
          signImage: safe(entry.signImage || ""),
          handShapeImages: [...new Set((entry.handShapeImages || []).filter(Boolean))]
        };
        const hasMedia = normalized.video || normalized.signImage || normalized.handShapeImages.length;
        if (!hasMedia) return;
        const signature = buildWordAssetSignature(normalized, group.word);
        if (!signature || signature === baseSignature || seen.has(signature)) return;
        seen.add(signature);
        merged.push(normalized);
      });
      return merged;
    }

    function groupHasVariantAssets(group){
      return getEffectiveVariants(group).length > 0;
    }

    function getWordVariantSlotCount(group){
      return group ? (1 + getEffectiveVariants(group).length) : 0;
    }

    function getWordAssetEntryBySlot(group, mode, slot){
      if (!group) return null;
      if (slot <= 0){
        return {
          url: mode === "W" ? safe(group.wordVideo) : safe(group.wordSignImage),
          label: "표제어",
          word: group.word,
          handShapeImages: [...(group.handShapeImages || [])],
          isVariant: false
        };
      }
      const variant = getEffectiveVariants(group)[slot - 1] || null;
      if (!variant){
        return null;
      }
      return {
        url: mode === "W" ? safe(variant.video) : safe(variant.signImage),
        label: variant.label || `변이형${slot}`,
        word: variant.word || group.word,
        handShapeImages: [...(variant.handShapeImages || [])],
        isVariant: true
      };
    }

    function getWordVariantSlot(group){
      ensureWordAssetState(group);
      const totalSlots = Math.max(1, getWordVariantSlotCount(group));
      activeWordAssetState.index = clamp(activeWordAssetState.index || 0, 0, Math.max(0, totalSlots - 1));
      return activeWordAssetState.index;
    }

    function getCurrentWordAssetEntry(group, mode){
      const slot = getWordVariantSlot(group);
      const entry = getWordAssetEntryBySlot(group, mode, slot);
      return {
        slot,
        entry,
        totalSlots: getWordVariantSlotCount(group)
      };
    }

    function describeVariantSlot(group, mode, slot){
      const totalSlots = Math.max(1, getWordVariantSlotCount(group));
      const typeLabel = mode === "W" ? "영상" : "수어문자";
      if (slot <= 0){
        return totalSlots > 1 ? `표제어 1/${totalSlots} ${typeLabel}` : `표제어 ${typeLabel}`;
      }
      return `변이형 ${slot + 1}/${totalSlots} ${typeLabel}`;
    }

    async function cycleCurrentWordAsset(mode){
      const group = getCurrentGroup();
      if (!group){
        showOverlay("검색 결과가 없습니다.", 1200);
        return;
      }
      ensureWordAssetState(group);
      const totalSlots = getWordVariantSlotCount(group);
      if (totalSlots <= 1){
        showOverlay("변이형이 없습니다.", 900);
        return;
      }
      activeWordAssetState.index = (activeWordAssetState.index + 1) % totalSlots;
      currentVideoTime = 0;
      // W/E 변이형 전환은 전체 render() 대신 현재 스테이지만 즉시 다시 그려서
      // 팝업 문구와 실제 영상/이미지 갱신이 한 박자 어긋나지 않게 합니다.
      renderMainStage(getShouldAutoplay());
      renderInfo();
      renderStatus();
      updatePlaybackButton();
      maybeShowVariantHint();
      await saveState();
      showOverlay(describeVariantSlot(group, mode, activeWordAssetState.index), 900);
    }
