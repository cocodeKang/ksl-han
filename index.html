    async function triggerMode(mode){
      const prevMode = currentMode;
      // Q 모드를 별도의 토글 없이 표제어 텍스트로만 전환합니다.
      if (mode === "Q"){
        resetWordAssetState();
        await setMode("Q");
        mobileSCycleState = 0;
        gToggleState = 0;
        return;
      }

      // 현재 모드에서 다시 버튼을 누른 경우의 특수 동작 처리
      if (mode === currentMode){
        // W/E 모드는 변이형 순환
        if (mode === "W" || mode === "E"){
          await cycleCurrentWordAsset(mode);
          return;
        }
        // D 모드는 모바일에서 확대/복원
        if (mode === "D" && isMobileViewport()){
          if (canUseImageZoom() && imageZoom.scale > 1.01){
            resetImageZoom();
            showOverlay("원래 크기", 700);
            return;
          }
          if (canUseImageZoom()){
            zoomImageFit("left");
            showOverlay("처음 위치 확대", 700);
            return;
          }
        }
        // S 모드는 모바일에서 구간 반복 기능을 순환합니다.
        if (mode === "S" && isMobileViewport()){
          handleMobileSCycle();
          return;
        }
        // G 모드는 두 번째 누를 때 입 모양 비디오로 전환합니다.
        if (mode === "G"){
          handleGToggle();
          return;
        }
      }

      // Z 모드는 뜻풀이 보기
      if (mode === "Z"){
        resetWordAssetState();
        await setMode("Z");
        mobileSCycleState = 0;
        gToggleState = 0;
        return;
      }

      // X 모드는 부가정보 보기
      if (mode === "X"){
        resetWordAssetState();
        await setMode("X");
        mobileSCycleState = 0;
        gToggleState = 0;
        return;
      }

      // 나머지 모드들은 기본 동작 처리. W/E 상호 전환 시 변이 상태를 유지합니다.
      const preserveVariantSlot = ((currentMode === "W" || currentMode === "E") && (mode === "W" || mode === "E"));
      const currentGroup = getCurrentGroup();
      const preservedSlot = preserveVariantSlot ? getWordVariantSlot(currentGroup) : 0;
      if (!preserveVariantSlot){
        resetWordAssetState();
      } else {
        ensureWordAssetState(currentGroup);
      }
      await setMode(mode, { preserveWordAssetState: preserveVariantSlot });
      if (preserveVariantSlot){
        const nextGroup = getCurrentGroup();
        if (nextGroup){
          activeWordAssetState.groupId = nextGroup.id || "";
          activeWordAssetState.index = clamp(preservedSlot, 0, Math.max(0, getWordVariantSlotCount(nextGroup) - 1));
        }
      }
      // W/E 모드로 새롭게 전환할 때 변이형 힌트를 보여줍니다.
      if ((mode === "W" || mode === "E") && prevMode !== mode){
        forceVariantHintPopup();
      }
    }

    function findPreviewExampleByGroupId(groupId, preferredText = ""){
      const key = String(groupId || "");
      if (!key) return null;
      if (preferredText){
        return examplePool.find(ex => String(ex.groupId) === key && ex.text === preferredText) || null;
      }
      return examplePool.find(ex => String(ex.groupId) === key) || null;
    }

    function sortFilteredGroupsByWordLength(list){
      const qNorm = (!searchIdMode && els.searchInput) ? normalizeHangulString(safe(els.searchInput.value).toLowerCase()).toLowerCase() : "";
      list.sort((a, b) => ((qNorm && a.wordNorm === qNorm ? -1 : 0) - (qNorm && b.wordNorm === qNorm ? -1 : 0))
        || (a.word.length - b.word.length)
        || a.word.localeCompare(b.word, "ko")
        || String(a.id).localeCompare(String(b.id), "ko"));
      return list;
    }

    function sortFilteredExamplesByWordLength(list){
      list.sort((a, b) => (a.word.length - b.word.length)
        || ((a.text || "").length - (b.text || "").length)
        || a.word.localeCompare(b.word, "ko")
        || String(a.groupId).localeCompare(String(b.groupId), "ko"));
      return list;
    }

    function matchesGroupQuery(group, qNorm, scope){
      if (!qNorm) return true;
      if (scope === "word"){
        return exactMatch ? group.wordNorm === qNorm : group.wordSearchBlob.includes(qNorm);
      }
      if (scope === "example"){
        return exactMatch
          ? group.exampleNorms.some(norm => norm === qNorm)
          : group.exampleSearchBlob.includes(qNorm);
      }
      if (exactMatch){
        return group.wordNorm === qNorm || group.exampleNorms.some(norm => norm === qNorm) || group.definitionNorm === qNorm;
      }
      return group.searchBlob.includes(qNorm);
    }

    function matchesExampleQuery(item, qNorm, scope){
      if (!qNorm) return true;
      if (scope === "word") return exactMatch ? item.wordNorm === qNorm : item.wordNorm.includes(qNorm);
      if (scope === "example") return exactMatch ? item.textNorm === qNorm : item.textNorm.includes(qNorm);
      return exactMatch ? (item.wordNorm === qNorm || item.textNorm === qNorm) : item.searchBlob.includes(qNorm);
    }

    async function applyFilter(options = {}){
      const { save = true } = options;
      const previousGroupId = safe(pendingRestoreGroupId || getCurrentGroup()?.id || "");
      const previousExampleToken = safe(pendingRestoreExampleToken || (isExampleMode() ? makeExampleSelectionToken(getCurrentPoolItem()) : lastViewedExampleToken));
      pendingRestoreGroupId = "";
      pendingRestoreExampleToken = "";
      const q = safe(els.searchInput.value).trim();
      const qId = searchIdMode ? q.replace(/\D+/g, "") : "";
      const qNorm = (!searchIdMode && q) ? normalizeHangulString(q.toLowerCase()).toLowerCase() : "";
      const cat = safe(els.categorySelect.value);
      const sourceFilter = safe(els.sourceSelect?.value);
      const scope = getSearchScope();
      const selectionSet = selectionModeActive ? getSelectionWordSet() : null;
      const selectionGroupTokenSet = selectionModeActive ? getSelectionGroupTokenSet() : null;
      const selectionExampleTokenSet = selectionModeActive ? getSelectionExampleTokenSet() : null;
      const selectedPick = getActiveSelectedSearchPick(q, scope);
      const selectedGroupId = selectedPick?.id ? String(selectedPick.id) : "";
      const selectedExampleText = selectedPick?.type === "example" ? safe(selectedPick.text) : "";
      const multiGroupSet = hasActiveMultiSearchSelection() ? new Set(multiSelectedSearchItems.map(item => String(item.id || "")).filter(Boolean)) : null;
      const multiExampleKeySet = hasActiveMultiSearchSelection() ? new Set(multiSelectedSearchItems.filter(item => item.type === "example").map(item => `${String(item.id || "")}::${safe(item.text)}`)) : null;
      const multiHasWord = hasActiveMultiSearchSelection() ? multiSelectedSearchItems.some(item => item.type !== "example") : false;

      const groupBase = groupsByCategory.get(cat) || [];
      const exampleBase = examplesByCategory.get(cat) || [];

      filteredGroups = [];
      for (const g of groupBase){
        if (sourceFilter && safe(g.sourceName) !== sourceFilter) continue;
        if (selectionSet && !selectionSet.has(g.id)) continue;
        if (multiGroupSet && multiGroupSet.size){
          if (!multiGroupSet.has(String(g.id))) continue;
        } else if (selectedGroupId){
          if (String(g.id) !== selectedGroupId) continue;
        } else if (searchIdMode){
          if (qId && !String(g.sourceId || "").includes(qId)) continue;
        } else if (!matchesGroupQuery(g, qNorm, scope)) {
          continue;
        }
        filteredGroups.push(g);
      }
      if (qNorm || qId) sortFilteredGroupsByWordLength(filteredGroups);

      const exampleCandidates = [];
      for (const item of exampleBase){
        if (sourceFilter && safe(item.sourceName) !== sourceFilter) continue;
        if (selectionModeActive){
          const exToken = makeExampleSelectionToken(item);
          const groupSelected = selectionGroupTokenSet && selectionGroupTokenSet.has(String(item.groupId));
          const exampleSelected = selectionExampleTokenSet && selectionExampleTokenSet.has(exToken);
          if (!groupSelected && !exampleSelected) continue;
        }
        if (multiGroupSet && multiGroupSet.size){
          const groupMatch = multiHasWord && multiGroupSet.has(String(item.groupId));
          const exampleMatch = multiExampleKeySet && multiExampleKeySet.has(`${String(item.groupId)}::${safe(item.text)}`);
          if (!groupMatch && !exampleMatch) continue;
        } else if (selectedGroupId){
          if (String(item.groupId) !== selectedGroupId) continue;
          if (selectedExampleText && safe(item.text) !== selectedExampleText) continue;
        } else if (searchIdMode){
          const group = groupById.get(String(item.groupId || ""));
          if (qId && !String(group?.sourceId || "").includes(qId)) continue;
        } else if (!matchesExampleQuery(item, qNorm, scope)) {
          continue;
        }
        exampleCandidates.push(item);
      }
      if (qNorm || qId) sortFilteredExamplesByWordLength(exampleCandidates);

      filteredExamplePool = selectionModeActive
        ? (selectionExampleTokenSet && selectionExampleTokenSet.size ? exampleCandidates : buildBalancedExamplePool(exampleCandidates))
        : exampleCandidates;
      applyDeterministicShuffleOrder();

      if (previousGroupId && filteredGroups.length){
        const groupIdx = filteredGroups.findIndex(g => String(g.id) === previousGroupId);
        if (groupIdx >= 0) currentIndex = groupIdx;
      }
      if (previousExampleToken && filteredExamplePool.length){
        const exIdx = filteredExamplePool.findIndex(item => makeExampleSelectionToken(item) === previousExampleToken);
        if (exIdx >= 0) currentPoolIndex = exIdx;
      }
      if (currentIndex >= filteredGroups.length) currentIndex = 0;
      if (currentPoolIndex >= filteredExamplePool.length) currentPoolIndex = 0;

      applyPendingSearchPickToResults();
      if (previousGroupId && filteredGroups.length){
        const groupIdx2 = filteredGroups.findIndex(g => String(g.id) === previousGroupId);
        if (groupIdx2 >= 0) currentIndex = groupIdx2;
      }
      if (previousExampleToken && filteredExamplePool.length){
        const exIdx2 = filteredExamplePool.findIndex(item => makeExampleSelectionToken(item) === previousExampleToken);
        if (exIdx2 >= 0) currentPoolIndex = exIdx2;
      }
      if (currentIndex >= filteredGroups.length) currentIndex = 0;
      if (currentPoolIndex >= filteredExamplePool.length) currentPoolIndex = 0;

      updateCount();
      resetWordAssetState();
      render();
      if (save) await saveState();
    }

    function installMediaDiagnostics(){
      const imageErrorMessage = "이미지를 불러오지 못했습니다. URL 또는 외부 서버 정책(CORS/핫링크 차단)을 확인해 주세요.";
      const videoErrorMessage = "영상을 불러오지 못했습니다. URL 또는 외부 서버 정책(CORS/핫링크 차단)을 확인해 주세요.";

      const onImgError = (target, emptyText) => {
        if (!target) return;
        const src = target.getAttribute("src") || "";
        console.warn("이미지 로드 실패", src);
        target.style.display = "none";
        if (target === els.mainImage){
          showMainText(emptyText || imageErrorMessage);
        }
      };

      if (els.wordSignImg){
        els.wordSignImg.addEventListener("error", () => onImgError(els.wordSignImg, ""));
      }
      if (els.handShapeImg){
        els.handShapeImg.addEventListener("error", () => onImgError(els.handShapeImg, ""));
      }
      if (els.mainImage){
        els.mainImage.addEventListener("error", () => onImgError(els.mainImage, imageErrorMessage));
      }
      if (els.mainVideo){
        els.mainVideo.addEventListener("error", () => {
          const src = els.mainVideo.currentSrc || els.mainVideo.getAttribute("src") || "";
          console.warn("영상 로드 실패", src, els.mainVideo.error);
          if (els.mainVideo.style.display !== "none"){
            showMainText(videoErrorMessage);

      if (els.mainGallery){

      els.mainVideo.removeAttribute("src");
      els.mainVideo.load();
      clearMainFrame();
      // 비디오를 비우는 경우 캐싱된 currentSrc 값도 초기화하여
      // 이후 비디오 모드 전환 시 재설정되도록 합니다.
      els.mainVideo.dataset.currentSrc = "";

    function applyVideoLoopState(){
      els.mainVideo.loop = (playbackMode === "LOOP");
    }

    function showMainVideo(url, autoPlay = false, options = {}){
      resetImageZoom();
      const nextSrc = url || "";
      const clipStart = Number.isFinite(Number(options?.start)) ? Number(options.start) : null;
      const clipEnd = Number.isFinite(Number(options?.end)) ? Number(options.end) : null;

      if (!nextSrc){
        clearMainFrame();
        hideAllMainPanels();
        els.mainVideo.pause();
        els.mainVideo.removeAttribute("src");
        els.mainVideo.load();
        els.mainVideo.dataset.currentSrc = "";
        return;
      }

      if (isYoutubeVideoUrl(nextSrc)){
        try { els.mainVideo.pause(); } catch (_) {}
        els.mainVideo.removeAttribute("src");
        els.mainVideo.load();
        els.mainVideo.dataset.currentSrc = "";
        const embedUrl = buildYoutubeEmbedUrl(nextSrc, {
          autoPlay,
          start: clipStart,
          end: clipEnd
        });
        if (!embedUrl){
          clearMainFrame();
          showMainText("유튜브 영상을 불러오지 못했습니다.");
          return;
        }
        showMainFrame(embedUrl);
        return;
      }

      clearMainFrame();
      hideAllMainPanels();
      els.mainVideo.style.display = "block";
      applyVideoLoopState();

      const prevSrc = els.mainVideo.dataset.currentSrc || "";
      const srcChanged = prevSrc !== nextSrc;

      if (srcChanged){
        try { els.mainVideo.pause(); } catch (_) {}
        // 이전 프레임이 잠깐 남아 표제어 영상처럼 보이는 현상을 줄이기 위해
        // src를 한 번 비운 뒤 새 주소를 다시 로드합니다.
        els.mainVideo.removeAttribute("crossorigin");
        els.mainVideo.removeAttribute("src");
        els.mainVideo.load();
        els.mainVideo.dataset.currentSrc = nextSrc;
        if (nextSrc){
          els.mainVideo.src = nextSrc;
        } else {
          els.mainVideo.removeAttribute("src");
        }
        els.mainVideo.load();
      }

      if (srcChanged){
        try { els.mainVideo.currentTime = 0; } catch (_) {}
      }

      if (Number.isFinite(clipStart)){
        pendingRestoreTime = clipStart;
      }
      if (Number.isFinite(clipStart) && Number.isFinite(clipEnd) && clipEnd > clipStart){
        pendingClipFocus = { start: clipStart, end: clipEnd };
      }

      if (autoPlay){
        const playVideo = () => els.mainVideo.play().catch(() => {});
        if (srcChanged && els.mainVideo.readyState < 1){
          els.mainVideo.addEventListener("loadedmetadata", playVideo, { once:true });
        } else {
          playVideo();
        }
      }
    }

    function showMainGallery(urls, altPrefix = "표제어 수형그림"){

          : (group.handShapeImages || []);
        showMainGallery(galleryImages, currentAsset?.slot > 0 ? "변이형 수형그림" : "표제어 수형그림");

        showMainText(info);

      setImage(els.handShapeImg, group.handShapeImage, "수형그림");

    function scoreSuggestion(norm, qNorm, rawText){
      if (!qNorm) return 999;
      if (norm === qNorm) return 0;

function sanitizeRoomKey(value){
  const cleaned = safe(value)
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 40);
  return cleaned || FIREBASE_DEFAULT_ROOM;
}

function makeDataHash(text){
  let hash = 2166136261;
  for (let i = 0; i < text.length; i++){
    hash ^= text.charCodeAt(i);
    hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
  }
  return (hash >>> 0).toString(16).padStart(8, "0");
}

function buildDatasetFingerprint(dataRows = rows){
  if (!Array.isArray(dataRows) || !dataRows.length) return "";
  const sample = dataRows.slice(0, 4000).map(row => [
    safe(row.id || row.ID || row.sourceId),
    safe(row.word || row.표제어),
    safe(row.variantLabel || row.변이범주),
    safe(row.exampleText || row.용례번역문),
    safe(row.video || row.표제어영상),
    safe(row.exampleVideo || row.용례영상)
  ].join("|")).join("§");
  return `fp-${dataRows.length}-${makeDataHash(sample)}`;
}

function updateFirebaseStatus(text, tone = "normal"){

  const now = Date.now();
  if (fullText === lastFirebaseStatusText && tone === lastFirebaseStatusTone && (now - lastFirebaseStatusAt) < 1200) return;

  const mobileShort = (() => {
    if (/연결됨|연결 완료/i.test(fullText)) return "연결됨";
    if (/로컬/i.test(fullText)) return "로컬";
    if (/저장 중|동기화 중/i.test(fullText)) return "저장중";
    if (/저장됨|동기화 완료/i.test(fullText)) return "저장됨";

    if (/로그인/i.test(fullText)) return "로그인";
    if (/실패|오류|제한|필요|다른 파일/i.test(fullText)) return "오류";
    if (/대기/i.test(fullText)) return "대기중";
    return fullText.length > 7 ? `${fullText.slice(0, 7)}…` : fullText;
  })();

    remoteApplyTimer = null;
    if (pendingRemoteStateEnvelope && !isSyncUiBusy()){
      applyRemoteStateEnvelope(pendingRemoteStateEnvelope, { silent: true }).catch(err => console.warn("지연된 원격 상태 반영 실패", err));

function isSyncUiBusy(){
  if (searchComposing) return true;
  const now = Date.now();
  if (now < syncUiBusyUntil) return true;
  if (now < selectionUiLockUntil) return true;
  const active = document.activeElement;
  const tag = String(active?.tagName || "").toUpperCase();
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return true;
  if (els.searchSuggestions?.classList?.contains("open")) return true;
  if (els.selectionContent?.querySelector?.('[data-role="preset-select"]:focus')) return true;
  if (els.selectionContent?.querySelector?.('[data-role="preset-name"]:focus')) return true;
  const hoveredSelection = document.querySelector('.selection-panel:hover, .selection-panel :hover, .search-wrap:hover, .search-wrap :hover');
  if (hoveredSelection) return true;
  const focusedSelection = document.querySelector('.selection-panel :focus, .search-wrap :focus');
  if (focusedSelection) return true;
  return false;
}

function shouldDeferRemoteApply(envelope = null){
  if (isApplyingRemoteState) return true;
  if (!envelope) return isSyncUiBusy();
  if (envelope?.updatedBy === firebaseUid) return false;

}

function scheduleFirebaseStatePush(payload = null, immediate = false){

      updateFirebaseStatus("상태 저장 실패", "error");

    }).finally(() => {

    });

}

async function flushPendingFirebaseStatePush(payload = null){
  if (pendingFirebaseStateTimer){
    clearTimeout(pendingFirebaseStateTimer);
    pendingFirebaseStateTimer = null;
    pendingFirebaseStatePromise = pushStateToFirebase(payload).catch(err => {
      console.error("Firestore 상태 저장 실패", err);
      updateFirebaseStatus("상태 저장 실패", "error");
      throw err;
    }).finally(() => {
      pendingFirebaseStatePromise = null;
    });
  }
  if (pendingFirebaseStatePromise){
    try{
      await pendingFirebaseStatePromise;
    }catch{}
  }
}

async function pushStateToFirebase(payload = null){
  if (!firebaseReady || !firebaseUid || !currentDatasetFingerprint || isApplyingRemoteState) return false;
  if (!firebaseBootstrapChecked) return false;
  const envelope = buildSyncEnvelope(payload);
  const signature = JSON.stringify({ room: syncRoomKey, fp: envelope.datasetFingerprint, payload: envelope.payload });
  if (signature === lastPushedStateSignature) return false;
  await setDoc(roomDocRef(), envelope);
  lastPushedStateSignature = signature;
  lastRemoteAppliedUpdatedAt = Math.max(lastRemoteAppliedUpdatedAt, envelope.updatedAtClient || 0);
  lastLocalStateSavedAt = Math.max(lastLocalStateSavedAt, envelope.payload?.localSavedAt || envelope.updatedAtClient || 0);
  updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
  return true;
}

async function applyRemoteStateEnvelope(envelope, options = {}){
  const { silent = false, forceRemote = false } = options;
  const payload = envelope?.payload || envelope;
  if (!payload) return false;
  const updatedAtClient = Number(envelope?.updatedAtClient || payload?.localSavedAt || 0);

  if (!forceRemote){
    if (envelope?.updatedBy !== firebaseUid && updatedAtClient && lastLocalStateSavedAt && updatedAtClient <= lastLocalStateSavedAt){
      return false;
    }
    if (envelope?.updatedBy !== firebaseUid && Date.now() < localStateHoldUntil){
      pendingRemoteStateEnvelope = envelope;
      markSyncUiBusy(1600);
      return false;
    }
    if (shouldDeferRemoteApply(envelope)){
      pendingRemoteStateEnvelope = envelope;
      markSyncUiBusy(1400);
      return false;
    }
  }

  const fingerprint = safe(envelope?.datasetFingerprint || payload?.datasetFingerprint || "");
  if (!rows.length){
    pendingRemoteStateEnvelope = envelope;
    updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
    if (!silent) showOverlay("같은 XLSX를 불러오면 이어서 진행됩니다", 1600);
    return true;
  }

  if (fingerprint && currentDatasetFingerprint && fingerprint !== currentDatasetFingerprint){
    const sameNamedSource = safe(envelope?.sourceName || "") && safe(envelope?.sourceName || "") === safe(currentSourceName || "");
    if (!(forceRemote || sameNamedSource)){
      pendingRemoteStateEnvelope = envelope;
      updateFirebaseStatus("다른 XLSX 기준 상태", "error");
      if (!silent) showOverlay("동기화된 상태가 현재 XLSX와 다릅니다", 1600);
      return false;
    }
    updateFirebaseStatus("Firestore 상태 기준 적용", "ok");
  }

  if (!forceRemote && updatedAtClient && updatedAtClient <= lastRemoteAppliedUpdatedAt) return false;

  const signature = JSON.stringify({ fp: fingerprint || currentDatasetFingerprint, payload });
  if (!forceRemote && envelope?.updatedBy === firebaseUid && signature === lastPushedStateSignature) return false;
  if (!forceRemote && signature === lastAppliedRemoteStateSignature) return false;

  lastAppliedRemoteStateSignature = signature;
  if (updatedAtClient) lastRemoteAppliedUpdatedAt = updatedAtClient;
  lastLocalStateSavedAt = Math.max(lastLocalStateSavedAt, Number(payload?.localSavedAt || 0), updatedAtClient || 0);
  pendingRemoteStateEnvelope = null;
  remotePullCooldownUntil = Math.max(remotePullCooldownUntil, Date.now() + 1800);

  isApplyingRemoteState = true;
  try{
    await idbSet(CACHE_KEYS.STATE, payload);
    await idbSet(`${CACHE_KEYS.STATE}:${syncRoomKey}`, payload);
    applyRestoredUIState(payload);
    updateExactMatchButton();
    await applyFilter({ save: false });
    render(false);
  } finally {
    isApplyingRemoteState = false;
  }

  updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
  if (!silent) showOverlay(forceRemote ? "Firestore 기준 상태를 불러왔습니다" : "다른 기기 진행상태를 불러왔습니다", 1200);
  return true;
}

  return applyRemoteStateEnvelope(pendingRemoteStateEnvelope, options);
}

function cleanupFirebaseWatchers(){
  if (firebaseStateUnsub){ try { firebaseStateUnsub(); } catch {} firebaseStateUnsub = null; }
  if (firebaseMetaUnsub){ try { firebaseMetaUnsub(); } catch {} firebaseMetaUnsub = null; }
  if (firebaseConnectionUnsub){ try { firebaseConnectionUnsub(); } catch {} firebaseConnectionUnsub = null; }
}

function startFirebaseLiveWatchers(){
  cleanupFirebaseWatchers();
  if (!firebaseReady || !firebaseDb) return;
  firebaseStateUnsub = onSnapshot(roomDocRef(), async (snap) => {
    if (!snap.exists()) return;
    try{
      const envelope = snap.data();
      const remoteTs = Number(envelope?.updatedAtClient || envelope?.payload?.localSavedAt || 0);
      const forceRemote = firebaseBootstrapping || !lastRemoteAppliedUpdatedAt;
      if (!forceRemote && envelope?.updatedBy !== firebaseUid && remoteTs && lastLocalStateSavedAt && remoteTs <= lastLocalStateSavedAt){
        return;
      }
      if (!forceRemote && envelope?.updatedBy !== firebaseUid && Date.now() < localStateHoldUntil){
        pendingRemoteStateEnvelope = envelope;
        markSyncUiBusy(1600);
        return;
      }
      if (!forceRemote && shouldDeferRemoteApply(envelope)){
        pendingRemoteStateEnvelope = envelope;
        markSyncUiBusy(1400);
        return;
      }
      await applyRemoteStateEnvelope(envelope, { silent: true, forceRemote });
    }catch(err){
      console.error("실시간 상태 반영 실패", err);
    }
  }, (err) => {
    console.error("실시간 리스너 오류", err);
    updateFirebaseStatus("리스너 오류", "error");
  });
}

  updateLiveSyncButton();

  if (liveSyncEnabled){
    firebasePushEnabled = false;

    lastLocalStateSavedAt = 0;
    if (pendingFirebaseStateTimer){ clearTimeout(pendingFirebaseStateTimer); pendingFirebaseStateTimer = null; }
    await loadInitialFirebaseSnapshot({ forceRemote: true, silent: true });
    startFirebaseLiveWatchers();

    updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
    showOverlay("실시간 리스너 켜짐", 900);

async function loadInitialFirebaseSnapshot(options = {}){
  const { forceRemote = false, silent = false } = options;
  if (!firebaseReady || !firebaseDb) return false;
  const prevPushEnabled = firebasePushEnabled;
  firebasePushEnabled = false;
  try{
    const snap = await getDoc(roomDocRef());
    firebaseBootstrapChecked = true;
    hasRemoteStateInRoom = !!snap.exists();
    firebaseBootstrapRemoteExists = !!snap.exists();
    if (!snap.exists()){
      updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
      return false;
    }
    const envelope = snap.data();
    pendingRemoteStateEnvelope = envelope;
    lastAppliedRemoteStateSignature = "";
    if (forceRemote || firebaseBootstrapping){
      localStateHoldUntil = 0;
      remotePullCooldownUntil = 0;
      lastLocalStateSavedAt = 0;
    }
    if (rows.length){
      return applyRemoteStateEnvelope(envelope, { silent, forceRemote: true });
    }
    updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
    return true;
  } catch (err){
    firebaseBootstrapChecked = true;
    console.error("Firestore 상태 불러오기 실패", err);
    updateFirebaseStatus("이어받기 확인 실패", "error");
    return false;
  } finally {
    firebasePushEnabled = prevPushEnabled;
  }
}

async function reconnectFirebaseRoom(){

  syncRoomKey = nextRoomKey;
  localStorage.setItem(FIREBASE_ROOM_STORAGE_KEY, syncRoomKey);
  if (els.syncRoomInput) els.syncRoomInput.value = syncRoomKey;
  pendingRemoteStateEnvelope = null;
  firebaseBootstrapChecked = false;
  firebaseBootstrapRemoteExists = false;
  lastAppliedRemoteStateSignature = "";
  lastPushedStateSignature = "";
  lastRemoteAppliedUpdatedAt = 0;
  lastLocalStateSavedAt = 0;
  localStateHoldUntil = 0;
  remotePullCooldownUntil = 0;

  if (pendingFirebaseStateTimer){ clearTimeout(pendingFirebaseStateTimer); pendingFirebaseStateTimer = null; }
  const remoteLoaded = await loadInitialFirebaseSnapshot({ forceRemote: true, silent: true });

  startFirebaseLiveWatchers();

  updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
  firebaseBootstrapping = false;
  firebasePushEnabled = true;

${syncRoomKey}` : `Firestore에 저장된 상태 없음
${syncRoomKey}`, 1100);
}

async function initFirebaseSync(){
  try{
    if (firebaseApp && firebaseReady) return true;
    await ensureFirebaseSdk();
    firebaseApp = firebaseApp || initializeApp(firebaseConfig);
    firebaseAuth = getAuth(firebaseApp);
    firebaseDb = getFirestore(firebaseApp);
    try { await enableIndexedDbPersistence(firebaseDb); } catch (_) {}
    updateFirebaseStatus("로그인 중...");
    const cred = await signInAnonymously(firebaseAuth);
    firebaseUid = cred?.user?.uid || firebaseAuth.currentUser?.uid || "";
    firebaseReady = !!firebaseUid;
    if (els.syncRoomInput) els.syncRoomInput.value = syncRoomKey;
    if (firebaseReady){
      liveSyncEnabled = true;
      localStorage.setItem(FIREBASE_LIVE_STORAGE_KEY, "1");
    }
    updateLiveSyncButton();
    updateFirebaseStatus(firebaseReady ? `연결됨 · ${syncRoomKey}` : "로그인 실패", firebaseReady ? "ok" : "error");
    if (firebaseReady) startFirebaseLiveWatchers();
    return firebaseReady;
  } catch (err){
    console.error("Firestore 초기화 실패", err);
    firebaseReady = false;
    firebaseUid = "";
    const message = String(err?.message || err || "");
    const tone = /auth|login|permission|anonymous/i.test(message) ? "익명 로그인/권한 확인 필요" : "연결 실패";
    updateFirebaseStatus(tone, "error");
    showOverlay(`${tone}
파일 기능은 계속 사용 가능`, 1500);
    return false;
  }
}

    function getSearchSuggestions(){
      const qRaw = safe(els.searchInput.value).trim();
      const scope = getSearchScope();
      if (!qRaw){
        suggestionCacheKey = "";
        suggestionCacheItems = [];
        return [];
      }

      if (searchIdMode){
        const qId = qRaw.replace(/\D+/g, "");
        if (!qId){
          suggestionCacheKey = "";
          suggestionCacheItems = [];
          return [];
        }
        const cap = isMobileViewport() ? 40 : 80;
        const cacheKey = `id|${qId}|${cap}`;
        if (cacheKey === suggestionCacheKey) return suggestionCacheItems;
        const items = groups
          .filter(g => String(g.sourceId || "").includes(qId))
          .map(g => ({
            type: "word",
            text: `ID:${g.sourceId} · ${g.word}`,
            word: g.word,
            baseWord: g.word,
            id: g.id,
            sourceId: g.sourceId || g.id,
            len: String(g.sourceId || "").length,
            textLen: g.word.length,
            isVariant: false,
            variantLabel: "",
            score: String(g.sourceId || "").startsWith(qId) ? 0 : 50
          }))
          .sort(compareSuggestionItems)
          .slice(0, cap);
        suggestionCacheKey = cacheKey;
        suggestionCacheItems = items;
        return items;
      }

      const qNorm = normalizeHangulString(qRaw.toLowerCase()).toLowerCase();
      const cap = isMobileViewport() ? 50 : 100;
      const cacheKey = `${scope}|${qNorm}|${cap}`;
      if (cacheKey === suggestionCacheKey) return suggestionCacheItems;

      const buildMatches = (indexList, type) => {
        const list = [];
        const seen = type === "example" ? new Set() : null;
        for (const item of indexList){
          const norm = item.norm || "";
          if (!norm || !norm.includes(qNorm)) continue;
          if (seen){
            const dupKey = `${item.id}::${item.text}`;
            if (seen.has(dupKey)) continue;
            seen.add(dupKey);
          }
          list.push({
            type: item.type,
            text: item.text,
            word: item.word,
            baseWord: item.baseWord || item.word,
            id: item.id,
            sourceId: item.sourceId || item.id,
            len: item.len,
            textLen: item.textLen || 0,
            isVariant: !!item.isVariant,
            variantLabel: item.variantLabel || "",
            score: scoreSuggestion(norm, qNorm, item.text)
          });
          if (list.length >= cap * 2) break;
        }
        list.sort(compareSuggestionItems);
        return list.slice(0, cap);
      };

      let items = [];
      if (scope === "word"){
        items = buildMatches(wordSuggestionIndex, "word");
      } else if (scope === "example"){
        items = buildMatches(exampleSuggestionIndex, "example");
      } else {
        items = [...buildMatches(wordSuggestionIndex, "word"), ...buildMatches(exampleSuggestionIndex, "example")]
          .sort(compareSuggestionItems)
          .slice(0, cap);
      }

      suggestionCacheKey = cacheKey;
      suggestionCacheItems = items;
      return items;
    }

    function applySuggestionPick(item){
      if (!item) return;
      clearUndoSnapshot();
      const suggestionValue = searchIdMode
        ? String(item.sourceId || "").replace(/\D+/g, "")
        : (item.type === "word" ? item.word : item.text);
      pendingSearchPick = item;
      setSelectedSearchPick(item, suggestionValue);
      const applySearchInputValue = () => {
        if (els.searchInput.value !== suggestionValue){
          els.searchInput.value = suggestionValue;
        }
      };
      applySearchInputValue();
      requestAnimationFrame(applySearchInputValue);
      setTimeout(applySearchInputValue, 0);
      setTimeout(applySearchInputValue, 30);
      if (typeof els.searchInput.setSelectionRange === "function"){
        const end = suggestionValue.length;
        requestAnimationFrame(() => {
          try { els.searchInput.setSelectionRange(end, end); } catch {}
        });
      }
      if (isMobileViewport()) els.searchInput.blur();
      els.searchSuggestions.classList.remove("open");
      els.searchSuggestions.innerHTML = "";
      renderedSuggestionItems = [];
      restoreSearchPreview();
      Promise.resolve().then(() => applyFilter()).then(() => {
        applySearchInputValue();
        lastVariantHintGroupId = "";
        maybeShowVariantHint(true);
      });
    }

    function applyPendingSearchPickToResults(){
      const item = pendingSearchPick;
      if (!item) return;
      pendingSearchPick = null;
      if (item.type === "word" && item.id){
        const idx = filteredGroups.findIndex(g => String(g.id) === String(item.id));
        if (idx >= 0){
          currentIndex = idx;
          if (isExampleMode()) currentMode = "Q";
        }
      } else if (item.type === "example"){
        const idx2 = filteredExamplePool.findIndex(row => String(row.groupId) === String(item.id) && row.text === item.text);
        if (idx2 >= 0){
          currentPoolIndex = idx2;

    function renderSearchSuggestions(){
      const items = getSearchSuggestions();
      renderedSuggestionItems = items;
      if (!items.length || document.activeElement !== els.searchInput){
        els.searchSuggestions.classList.remove("open");
        els.searchSuggestions.innerHTML = "";
        searchFocusedIndex = -1;
        return;
      }

      if (searchFocusedIndex >= items.length) searchFocusedIndex = items.length - 1;
      const html = items.map((item, idx) => {
        const displayText = searchIdMode
          ? `${escapeHtml(item.text)}`
          : (item.type === "word"
              ? escapeHtml(`${item.word}${duplicateWords.has(item.word) ? ` (ID:${item.sourceId || item.id})` : ""}`)
              : escapeHtml(item.text));
        const wordDisplay = duplicateWords.has(item.word) ? `${item.word} (ID:${item.sourceId || item.id})` : item.word;
        const subLabel = searchIdMode
          ? `<span class="suggestion-sub">표제어: ${escapeHtml(item.word)}</span>`
          : (item.type === "example"
            ? `<span class="suggestion-sub">표제어: ${escapeHtml(wordDisplay)}</span>`
            : ``);
        return `
          <div class="suggestion-item ${idx === searchFocusedIndex ? "active" : ""}" data-idx="${idx}">

    function getSelectionSuggestions(){

    function startSelectionMode(){
      if (selectionModeActive){
        stopSelectionMode();
        return;
      }
      if (!selectedGroupIds.length){
        showOverlay("먼저 표제어를 하나 이상 선택해 주세요", 1500);
        return;
      }
      const entries = getSelectionEntries();
      const hasExampleOnly = entries.length > 0 && entries.every(token => parseSelectionToken(token)?.type === "example");
      selectionModeActive = true;
      // 이전 선택학습 중단 지점이 있으면 그 위치에서 다시 시작하고,
      // 다른 기기에서 이어받은 상태가 있으면 현재 인덱스를 그대로 사용합니다.
      if (selectionResumeIndex !== null && selectionResumeIndex >= 0){
        currentIndex = clamp(selectionResumeIndex, 0, Math.max(0, filteredGroups.length - 1));
      } else {
        currentIndex = clamp(Number(currentIndex || 0), 0, Math.max(0, filteredGroups.length - 1));
      }
      if (selectionResumePoolIndex !== null && selectionResumePoolIndex >= 0){
        currentPoolIndex = clamp(selectionResumePoolIndex, 0, Math.max(0, filteredExamplePool.length - 1));
      } else {
        currentPoolIndex = clamp(Number(currentPoolIndex || 0), 0, Math.max(0, filteredExamplePool.length - 1));
      }
      if (hasExampleOnly && !isExampleMode(currentMode)){
        currentMode = "D";
      }

      // 이전 검색/카테고리 조건 때문에 선택한 표제어 일부만 보이는 문제를 막습니다.
      els.searchInput.value = "";
      els.categorySelect.value = "";
      if (els.sourceSelect) els.sourceSelect.value = [...(els.sourceSelect.options || [])].some(opt => opt.value === "한국수어누리사전") ? "한국수어누리사전" : "";

    async function setMode(mode, options = {}){
      const { preserveWordAssetState = false } = options;
      if (mode !== currentMode) rememberUndoSnapshot();
      if (mode !== currentMode && !preserveWordAssetState) resetWordAssetState();
      const prevWasExample = isExampleMode(currentMode);
      const nextIsExample = isExampleMode(mode);
      const currentExampleItem = prevWasExample ? getCurrentPoolItem() : null;
      const currentExampleToken = currentExampleItem ? makeExampleSelectionToken(currentExampleItem) : lastViewedExampleToken;

      currentMode = mode;
      els.modeBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === getVisibleModeButton(mode));
      });

      if (!prevWasExample && nextIsExample){
        const group = getCurrentGroup();
        if (group){
          // 이전에 이 그룹에서 시청했던 예제가 있으면 그 위치를 기억하고, 없으면 첫 번째 예제로 이동합니다.
          const rememberedToken = lastExampleTokenByGroup[String(group.id)] || "";
          const rememberedIdx = rememberedToken ? filteredExamplePool.findIndex(item => makeExampleSelectionToken(item) === rememberedToken) : -1;
          if (rememberedIdx >= 0) {
            currentPoolIndex = rememberedIdx;
          } else {
            const idx = filteredExamplePool.findIndex(item => item.groupId === group.id);
            if (idx >= 0) currentPoolIndex = idx;
          }
        }
      } else if (prevWasExample && !nextIsExample){
        const item = currentExampleItem;
        if (item){
          // 현재 보고 있던 예제의 토큰을 기록합니다.
          const token = makeExampleSelectionToken(item);
          lastViewedExampleToken = token;
          lastExampleTokenByGroup[String(item.groupId)] = token;
          const idx = filteredGroups.findIndex(g => g.id === item.groupId);
          if (idx >= 0) currentIndex = idx;
        }
      }

      currentVideoTime = 0;
      render(true);
      await saveState();
    }

    async function goNext(autoPlay = false){
      clearUndoSnapshot();
      currentVideoTime = 0;
      if (isExampleMode()){
        if (!filteredExamplePool.length) return;
        if (currentPoolIndex < filteredExamplePool.length - 1){
          currentPoolIndex++;
          render(autoPlay);
          await saveState();
        } else {
          showOverlay("마지막 용례입니다");
        }
        return;
      }

      if (!filteredGroups.length) return;
      if (currentIndex < filteredGroups.length - 1){
        currentIndex++;
        render(autoPlay);
        await saveState();
      } else {
        showOverlay("마지막 표제어입니다");
      }
    }

    async function goPrev(autoPlay = false){
      clearUndoSnapshot();
      currentVideoTime = 0;
      if (isExampleMode()){
        if (!filteredExamplePool.length) return;
        if (currentPoolIndex > 0){
          currentPoolIndex--;
          render(autoPlay);
          await saveState();
        } else {
          showOverlay("첫 용례입니다");
        }
        return;
      }

      if (!filteredGroups.length) return;
      if (currentIndex > 0){
        currentIndex--;
        render(autoPlay);
        await saveState();
      } else {
        showOverlay("첫 표제어입니다");
      }
    }

    async function shuffleCurrentOrder(){

      currentVideoTime = 0;
      const keepMode = currentMode;
      const newSeed = `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;

      if (isExampleMode()){
        if (filteredExamplePool.length <= 1) return;
        exampleShuffleSeed = newSeed;
      } else {
        if (filteredGroups.length <= 1) return;
        groupShuffleSeed = newSeed;

      render(getShouldAutoplay());

      if (els.mainVideo.paused){
        els.mainVideo.play().catch(() => {});
      } else {
        els.mainVideo.pause();
      }
    }

    function seekToPercent(n){
      if (!isVideoMode()) return;
      const v = els.mainVideo;
      if (!v.duration || !isFinite(v.duration)) return;
      const pct = Math.max(0, Math.min(9, n)) / 10;
      v.currentTime = v.duration * pct;
      currentVideoTime = v.currentTime;
      saveState();
      showOverlay(`${Math.round(pct * 100)}% 이동`, 700);
    }

    function stepFrame(dir){
      if (!isVideoMode()) return;
      const v = els.mainVideo;
      if (!isFinite(v.currentTime)) return;
      v.pause();
      v.currentTime = Math.max(0, v.currentTime + FRAME_STEP * dir);
      currentVideoTime = v.currentTime;
      saveState();
    }

    function changePlaybackRate(dir){
      if (!isVideoMode()) return;
      const v = els.mainVideo;
      const next = Math.max(0.25, Math.min(3, Math.round((v.playbackRate + dir * 0.25) * 100) / 100));
      v.playbackRate = next;
      showOverlay(`재생속도 ${next}x`, 700);
    }

    function setABStart(){
      if (!isVideoMode()) return;
      abLoopStart = els.mainVideo.currentTime;
      if (abLoopEnd !== null && abLoopEnd <= abLoopStart){
        abLoopEnd = null;
      }
      saveState();
      showOverlay(`구간 시작 ${abLoopStart.toFixed(2)}초`, 900);
    }

    function setABEnd(){
      if (!isVideoMode()) return;
      if (abLoopStart === null){
        showOverlay("먼저 [ 로 구간 시작을 지정해 주세요", 1200);
        return;
      }
      abLoopEnd = els.mainVideo.currentTime;
      if (abLoopEnd <= abLoopStart){
        showOverlay("구간 종료는 시작보다 뒤여야 합니다", 1200);
        abLoopEnd = null;
        return;
      }
      saveState();
      showOverlay(`구간 종료 ${abLoopEnd.toFixed(2)}초`, 900);
    }

    function clearABLoop(){
      if (abLoopStart === null && abLoopEnd === null){
        showOverlay("구간 반복이 설정되지 않았습니다", 900);
        return;
      }
      abLoopStart = null;
      abLoopEnd = null;
      renderStatus();
      saveState();
      scheduleFirebaseStatePush();
      showOverlay("구간 반복 초기화", 900);
    }

    /**
     * 모바일 환경에서 S 버튼을 연속으로 눌렀을 때 구간 반복 기능을 순차적으로 실행합니다.
     * 첫 번째 클릭은 S 모드 진입으로 용례 영상을 보여주고, 두 번째 클릭은 구간 시작,
     * 세 번째 클릭은 구간 종료, 네 번째 클릭은 구간 초기화로 순환합니다.
     */
    function handleMobileSCycle(){
      // 구간 시작 → 구간 종료 → 초기화 순환
      if (mobileSCycleState === 0){
        rememberUndoSnapshot();
        setABStart();
        mobileSCycleState = 1;
      } else if (mobileSCycleState === 1){
        rememberUndoSnapshot();
        setABEnd();
        mobileSCycleState = 2;
      } else {
        rememberUndoSnapshot();
        clearABLoop();
        mobileSCycleState = 0;
      }
    }

    /**
     * G 모드를 다시 누르면 수형그림 대신 입 모양 비디오를 보여주고, 다시 누르면 수형그림으로 되돌립니다.
     */
    function handleGToggle(){
      const group = getCurrentGroup();
      if (!group){
        return;
      }
      // 전환: 수형그림 → 입 모양 → 수형그림…
      if (gToggleState === 0){
        if (safe(group.mouthVideo)){
          showMainVideo(group.mouthVideo, true);
          gToggleState = 1;
        } else {
          showOverlay("입 모양 정보가 없습니다", 900);
        }
      } else {
        gToggleState = 0;
        // 기존 수형그림으로 되돌리기 위해 현재 모드를 다시 렌더링합니다.
        renderMainStage(false);
      }
    }


    function clearABEndHoldTimer(){
      if (abEndHoldTimer){
        clearTimeout(abEndHoldTimer);
        abEndHoldTimer = null;
      }
    }

    function bindABEndLongPress(){
      const btn = els.abEndBtn;
      if (!btn) return;
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        abEndHoldTriggered = false;
        clearABEndHoldTimer();
        abEndHoldTimer = setTimeout(() => {
          abEndHoldTriggered = true;
          clearABEndHoldTimer();
          rememberUndoSnapshot();
          clearABLoop();
        }, 650);
      });
      const finish = (e) => {
        e.preventDefault();
        const wasHold = abEndHoldTriggered;
        clearABEndHoldTimer();
        if (!wasHold){
          rememberUndoSnapshot();
          setABEnd();
        }
        abEndHoldTriggered = false;
      };
      btn.addEventListener("pointerup", finish);
      btn.addEventListener("pointercancel", () => {
        clearABEndHoldTimer();
        abEndHoldTriggered = false;
      });
      btn.addEventListener("pointerleave", () => {
        clearABEndHoldTimer();
      });
      btn.addEventListener("click", (e) => e.preventDefault());
    }

    async function captureCurrentStage(){
      try {
        const stage = els.stage;
        if (!stage) return;

        const downloadCanvas = (canvas) => {
          const a = document.createElement("a");
          const now = new Date();
          const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}${String(now.getSeconds()).padStart(2,"0")}`;
          a.href = canvas.toDataURL("image/png");
          a.download = `ksl_capture_${ts}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          showOverlay("현재 화면 캡처 완료", 900);
        };

        if (window.html2canvas){
          try{
            const canvas = await window.html2canvas(stage, {
              backgroundColor: "#000000",
              useCORS: true,
              allowTaint: true,
              logging: false,
              scale: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
              ignoreElements: (el) => {
                return el === els.tapPrevZone || el === els.tapNextZone || el === els.dropHint || el === els.rotateHotspot || el === els.overlayMsg;
              }
            });
            downloadCanvas(canvas);
            return;
          }catch(err){
            console.warn("html2canvas 캡처 실패, 수동 캔버스로 재시도", err);
          }
        }

        const rect = stage.getBoundingClientRect();
        const canvas = document.createElement("canvas");
        const width = Math.max(1, Math.round(rect.width));
        const height = Math.max(1, Math.round(rect.height));
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");

        const drawElementBox = (el) => {
          if (!el) return null;
          const r = el.getBoundingClientRect();
          return { x: r.left - rect.left, y: r.top - rect.top, w: r.width, h: r.height };
        };

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, width, height);
        const stageBg = getComputedStyle(stage).backgroundColor;
        if (stageBg && stageBg !== "rgba(0, 0, 0, 0)"){
          ctx.fillStyle = stageBg;
          ctx.fillRect(0, 0, width, height);
        }

        if (els.mainText.style.display === "flex"){
          const gradient = ctx.createLinearGradient(0, 0, width, height);
          gradient.addColorStop(0, "#0b0f17");
          gradient.addColorStop(1, "#101725");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);
          const text = els.mainText.textContent || "";
          ctx.fillStyle = "#f7f9ff";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `700 ${Math.max(24, Math.floor(width / 12))}px sans-serif`;
          const lines = text.split("\n");
          const lineHeight = Math.max(42, Math.floor(width / 10));
          const totalHeight = lines.length * lineHeight;
          let y = height / 2 - totalHeight / 2 + lineHeight / 2;
          lines.forEach(line => { ctx.fillText(line, width / 2, y, width * 0.88); y += lineHeight; });
          downloadCanvas(canvas);
          return;
        }

        if (els.mainGallery.style.display === "flex"){
          const imgs = [...els.mainGallery.querySelectorAll("img")].filter(img => img.complete && img.naturalWidth);
          if (!imgs.length){ showOverlay("캡처할 이미지가 없습니다", 1200); return; }
          for (const img of imgs){
            const box = drawElementBox(img);
            if (box) ctx.drawImage(img, box.x, box.y, box.w, box.h);
          }
          downloadCanvas(canvas);
          return;
        }

        if (els.mainImage.style.display === "block" && els.mainImage.naturalWidth){
          const box = drawElementBox(els.mainImage);
          ctx.drawImage(els.mainImage, box.x, box.y, box.w, box.h);
          downloadCanvas(canvas);
          return;
        }

        if (els.mainVideo.style.display === "block"){
          const box = drawElementBox(els.mainVideo);
          try {
            ctx.drawImage(els.mainVideo, box.x, box.y, box.w, box.h);
            downloadCanvas(canvas);
            return;
          } catch (err) {
            showOverlay("영상 캡처는 브라우저 보안 정책으로 제한될 수 있습니다", 1600);
            return;
          }
        }

        showOverlay("캡처할 화면이 없습니다", 1200);
      } catch (err){
        console.error(err);
        showOverlay("화면 캡처에 실패했습니다", 1400);
      }
    }

    function bindDynamicInfoEvents(container){
      const selectionWrap = container.querySelector('[data-role="selection-wrap"]');
      const selectionSearchInput = container.querySelector('[data-role="selection-search"]');
      const selectionSuggestions = container.querySelector('[data-role="selection-suggestions"]');
      const selectionAddCurrentBtn = container.querySelector('[data-role="selection-add-current"]');
      const selectionStartBtn = container.querySelector('[data-role="selection-start"]');
      const selectionClearAllBtn = container.querySelector('[data-role="selection-clear-all"]');
      const selectionToggleBtn = container.querySelector('[data-role="selection-toggle"]');
      const presetNameInput = container.querySelector('[data-role="preset-name"]');
      const presetSelect = container.querySelector('[data-role="preset-select"]');
      const presetSaveBtn = container.querySelector('[data-role="preset-save"]');
      const presetRenameBtn = container.querySelector('[data-role="preset-rename"]');
      const presetDeleteBtn = container.querySelector('[data-role="preset-delete"]');
      const lockSelectionUi = (ms = 3000) => {
        selectionUiLockUntil = Math.max(selectionUiLockUntil, Date.now() + ms);
        markSyncUiBusy(Math.min(ms, 2400));
      };

      if (selectionWrap){
        selectionWrap.addEventListener("pointerdown", () => lockSelectionUi(6000));
        selectionWrap.addEventListener("focusin", () => lockSelectionUi(6000));
        selectionWrap.addEventListener("mouseenter", () => lockSelectionUi(2200));
      }

      if (selectionSearchInput){
        // Update search string and refresh suggestions when user types
        selectionSearchInput.addEventListener("input", () => {
          lockSelectionUi(2600);
          selectionSearch = selectionSearchInput.value;
          selectionFocusedIndex = -1;
          renderInfo();
        });

        // When composition (IME) ends, normalize and update search and suggestions
        selectionSearchInput.addEventListener("compositionend", () => {
          lockSelectionUi(2600);
          // Normalize Hangul string to combine jamo into complete syllables
          selectionSearchInput.value = normalizeHangulString(selectionSearchInput.value);
          selectionSearch = selectionSearchInput.value;
          selectionFocusedIndex = -1;
          renderInfo();
        });

        selectionSearchInput.addEventListener("keydown", (e) => {
          lockSelectionUi(2600);
          const items = getSelectionSuggestions();
          if (e.key === "ArrowDown"){
            e.preventDefault();
            selectionFocusedIndex = Math.min(selectionFocusedIndex + 1, items.length - 1);
            renderInfo();
          } else if (e.key === "ArrowUp"){
            e.preventDefault();
            selectionFocusedIndex = Math.max(selectionFocusedIndex - 1, 0);
            renderInfo();
          } else if (e.key === "Enter"){
            e.preventDefault();
            if (items.length){
              const idx = Math.max(selectionFocusedIndex, 0);
              const item = items[idx];
              if (item) addSelectedGroup(item.id);
            } else if (selectionSearch.trim()){
              // Attempt to find a group matching the input exactly (normalized)
              const inputNorm = normalizeHangulString(selectionSearch.trim().toLowerCase());
              const found = groups.find(g => normalizeHangulString(g.word.toLowerCase()) === inputNorm);
              if (found){
                addSelectedGroup(found.id);
              } else {
                showOverlay("해당 표제어를 찾을 수 없습니다", 1500);
              }
            }
          }
        });
      }

      if (selectionSuggestions){
        // Bind suggestion item selection for selection mode
        [...selectionSuggestions.querySelectorAll("[data-select-id]")].forEach(el => {
          const pick = () => {
            const id = el.dataset.selectId || "";
            if (id) addSelectedGroup(id);
          };
          // Distinguish between scroll and tap
          let touchMoved = false;
          el.addEventListener("touchstart", () => {
            touchMoved = false;
          }, {passive:true});
          el.addEventListener("touchmove", () => {
            touchMoved = true;
          }, {passive:true});
          el.addEventListener("touchend", (e) => {
            if (touchMoved) return;
            e.preventDefault();
            e.stopPropagation();
            pick();
          }, { passive:false });

          el.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            pick();
          });
        });
      }

      if (selectionAddCurrentBtn){
        selectionAddCurrentBtn.addEventListener("click", () => {
          addCurrentGroupToSelection();
        });
      }

      if (selectionStartBtn){
        selectionStartBtn.addEventListener("click", startSelectionMode);
      }

      if (selectionClearAllBtn){
        selectionClearAllBtn.addEventListener("click", clearCurrentSelectionEntries);
      }

      if (selectionToggleBtn){
        selectionToggleBtn.addEventListener("click", async () => {
          selectionPanelCollapsed = !selectionPanelCollapsed;
          await saveState();
          renderInfo();
        });
      }

      if (presetNameInput){
        ["focus","mousedown","click","keydown"].forEach(evt => {
          presetNameInput.addEventListener(evt, () => lockSelectionUi(9000));
        });
        presetNameInput.addEventListener("input", () => {
          lockSelectionUi(9000);
          presetNameValue = presetNameInput.value;
          saveState();
        });
      }

      if (presetSelect){

    async function finalizeLoadedData(dataRows, sourceName, autoLoaded = false, saveCacheToo = false){
      rows = (Array.isArray(dataRows) ? dataRows : []).map((row, idx) => {
        const next = row && typeof row === "object" ? { ...row } : {};
        next.__rowIndex = idx;
        return next;
      });
      syncRowsMemoIntoNotes();
      groups = buildGroups(rows);
      // 중복되는 단어를 파악하여 duplicateWords 세트를 구성합니다.
      duplicateWords = new Set();
      const wordCounts = {};
      groups.forEach(g => {
        const w = g.word;
        wordCounts[w] = (wordCounts[w] || 0) + 1;
      });
      Object.entries(wordCounts).forEach(([w, count]) => {
        if (count > 1) duplicateWords.add(w);
      });
      examplePool = buildExamplePool(groups);
      rebuildFastIndexes();
      currentSourceName = sourceName;
      currentDatasetFingerprint = buildDatasetFingerprint(rows);
      if (migrateLegacyNotesToRowKeys()){
        await saveNotesCache();
      }

      updateCategoryOptions();
      updateSourceOptions();

      const state = await getPreferredInitialState();
      if (state) applyRestoredUIState(state);
      updateQuickButtons();

      if (saveCacheToo){
        await saveDataCache(sourceName);
      }

      await applyFilter({ save: false });
      if (!filteredGroups.length && groups.length && (safe(els.searchInput.value) || safe(els.categorySelect.value) || safe(els.sourceSelect?.value) || searchIdMode)){
        els.searchInput.value = "";
        els.categorySelect.value = "";
        if (els.sourceSelect){
          els.sourceSelect.value = [...els.sourceSelect.options].some(opt => opt.value === "한국수어누리사전") ? "한국수어누리사전" : "";
        }
        searchIdMode = false;
        clearSelectedSearchPick();
        updateSearchIdButton();
        updateSearchPlaceholder();
        await applyFilter({ save: false });
        showOverlay("이전 검색 조건을 초기화했습니다", 1200);
      }

      currentIndex = Math.min(currentIndex, Math.max(filteredGroups.length - 1, 0));
      currentPoolIndex = Math.min(currentPoolIndex, Math.max(filteredExamplePool.length - 1, 0));

      els.modeBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === currentMode);
      });

      if (!groups.length){
        els.statusText.textContent = "데이터 없음";
        showMainText("데이터를 찾지 못했습니다.");
        renderInfo();
        return;
      }

      pendingRestoreTime = currentVideoTime > 0 ? currentVideoTime : null;
      await applyPendingRemoteStateIfReady({ silent: true, forceRemote: true });
      render(getShouldAutoplay());

      const autoText = autoLoaded ? "자동 로드 완료" : "로드 완료";
      showOverlay(`${autoText}\n${sourceName}\n표제어 ${groups.length}개\n용례 ${examplePool.length}개`, 1700);
      await saveState();
    }

    function setupDragAndDrop(){
      const showDrop = () => els.dropHint.classList.add("show");
      const hideDrop = () => els.dropHint.classList.remove("show");

      ["dragenter", "dragover"].forEach(type => {
        window.addEventListener(type, (e) => {
          e.preventDefault();
          dragCounter++;
          showDrop();
        });
      });

      ["dragleave", "dragend"].forEach(type => {
        window.addEventListener(type, (e) => {
          e.preventDefault();
          dragCounter = Math.max(0, dragCounter - 1);
          if (dragCounter === 0) hideDrop();
        });
      });

      window.addEventListener("drop", async (e) => {
        e.preventDefault();
        dragCounter = 0;
        hideDrop();

        const files = [...(e.dataTransfer?.files || [])];
        const file = files.find(f => /\.(csv|xlsx)$/i.test(f.name));
        if (!file){
          showOverlay("드롭한 파일 중 CSV/XLSX를 찾지 못했습니다", 1800);
          return;
        }
        try{
          await loadFromFileObject(file);
        } catch (err){
          console.error(err);
          showOverlay("파일 처리 중 오류가 발생했습니다", 1800);
        }
      });
    }

    function findRowByVideoRange(url, startValue, endValue, scope = "auto"){
      const lookupKey = normalizeMediaLookupKey(url);
      if (!lookupKey) return null;
      const inputStart = parseTimeToSeconds(startValue);
      const inputEnd = parseTimeToSeconds(endValue);
      const candidates = [];

      rows.forEach((row, rowIndex) => {
        const clip = getRowClipInfo(row);
        const sourceLookupKey = normalizeMediaLookupKey(pickValue(row, ["sourceUrl", "원문", "원문페이지", "pageUrl", "url"]));
        const wordVideoKey = normalizeMediaLookupKey(pickValue(row, ["headwordVideo", "표제어영상", "표제어 영상", "wordVideo", "영상"]));
        const exampleVideoKey = normalizeMediaLookupKey(pickValue(row, ["exampleVideo", "용례영상", "용례 영상"]));
        const baseKey = sourceLookupKey || wordVideoKey || exampleVideoKey;

        if (scope !== "example" && baseKey && baseKey === lookupKey){
          if (isRangeMatch(inputStart, inputEnd, clip.wordStart, clip.wordEnd)){
            candidates.push({ rowIndex, mode: "W", score: calcRangeDistance(inputStart, inputEnd, clip.wordStart, clip.wordEnd), clipStart: clip.wordStart, clipEnd: clip.wordEnd, label: "표제어" });
          }
        }
        if (scope !== "word" && baseKey && baseKey === lookupKey){
          if (isRangeMatch(inputStart, inputEnd, clip.exampleStart, clip.exampleEnd)){
            candidates.push({ rowIndex, mode: "S", score: calcRangeDistance(inputStart, inputEnd, clip.exampleStart, clip.exampleEnd), clipStart: clip.exampleStart, clipEnd: clip.exampleEnd, label: "용례" });
          }
        }
      });

      candidates.sort((a, b) => (a.score - b.score) || (a.rowIndex - b.rowIndex));
      return candidates[0] || null;
    }

    async function focusMatchedRow(match){
      if (!match) return false;
      const row = getRowObject(match.rowIndex);
      if (!row) return false;
      const normalized = normalizeDataRow(row);
      if (!normalized) return false;
      const targetGroup = groups.find(group => Array.isArray(group.rowIndices) && group.rowIndices.includes(match.rowIndex)) || null;
      selectionModeActive = false;
      selectedGroupIds = [];
      els.searchInput.value = "";
      els.categorySelect.value = "";
      if (els.sourceSelect) els.sourceSelect.value = "";
      clearSelectedSearchPick();
      clearMultiSelectedSearch();
      suggestionCacheKey = "";
      searchIdMode = false;
      updateSearchIdButton();
      updateSearchPlaceholder();
      await applyFilter({ save:false });
      const groupId = String(targetGroup?.id || "");
      if (!groupId) return false;
      const groupIdx = filteredGroups.findIndex(group => String(group.id) === groupId);
      if (groupIdx < 0) return false;
      currentIndex = groupIdx;
      if (match.mode === "S"){
        const exIdx = filteredExamplePool.findIndex(item => String(item.groupId) === groupId && Number(item.rowIndex) === Number(match.rowIndex));
        if (exIdx >= 0) currentPoolIndex = exIdx;
        else {
          const fallbackIdx = filteredExamplePool.findIndex(item => String(item.groupId) === groupId);
          if (fallbackIdx >= 0) currentPoolIndex = fallbackIdx;
        }
      }
      currentMode = match.mode;
      if (Number.isFinite(match.clipStart) && Number.isFinite(match.clipEnd) && match.clipEnd > match.clipStart){
        abLoopStart = match.clipStart;
        abLoopEnd = match.clipEnd;
        currentVideoTime = match.clipStart;
        pendingRestoreTime = match.clipStart;
        pendingClipFocus = { start: match.clipStart, end: match.clipEnd };
      } else {
        pendingClipFocus = null;
      }
      render(getShouldAutoplay());
      await saveState();
      const timeText = Number.isFinite(match.clipStart) && Number.isFinite(match.clipEnd)
        ? `
${formatSecondsForUi(match.clipStart)} ~ ${formatSecondsForUi(match.clipEnd)}`
        : "";
      showOverlay(`${normalized.word} 불러옴
${match.label}${timeText}`, 1500);
      closeRangeLookupModal();
      return true;
    }

    function handleGlobalKeydown(e){
      if (e.defaultPrevented) return;
      const key = e.key.toLowerCase();

      if (e.key === "Escape"){
        if (els.helpModal?.classList.contains("open")){
          e.preventDefault();
          closeHelpModal();
          return;
        }
        if (els.noteModal?.classList.contains("open")){
          e.preventDefault();
          closeNoteModal();
          return;
        }
        if (els.rangeLookupModal?.classList.contains("open")){
          e.preventDefault();
          closeRangeLookupModal();
          return;
        }
        if (els.mobileSheet?.classList.contains("open")){
          e.preventDefault();
          closeMobileSheet();
          return;
        }
      }

      if (e.ctrlKey && key === 'y'){ e.preventDefault(); redoSelectionHistory(); return; }
      if (e.ctrlKey && key === 'f'){ e.preventDefault(); els.searchInput?.focus(); els.searchInput?.select?.(); renderSearchSuggestions(); return; }
      if (isTypingContext()) return;
      if (e.ctrlKey && key === 'q'){ e.preventDefault(); editCurrentField("Q"); return; }
      if (e.ctrlKey && key === 'z'){ e.preventDefault(); editCurrentField("Z"); return; }
      if (e.ctrlKey && key === 'x'){ e.preventDefault(); editCurrentField("X"); return; }
      if (e.ctrlKey && key === 'a'){ e.preventDefault(); editCurrentField("A"); return; }

      if (e.code === "Space"){
        e.preventDefault();
        togglePlayPause();
        return;
      }

      if (e.key === "ArrowRight"){
        e.preventDefault();
        goNext(getShouldAutoplay());
        return;
      }

      if (e.key === "ArrowLeft"){
        e.preventDefault();
        goPrev(getShouldAutoplay());
        return;
      }

      if (key === "q"){ e.preventDefault(); triggerMode("Q"); return; }
      if (key === "w"){ e.preventDefault(); triggerMode("W"); return; }
      if (key === "e"){ e.preventDefault(); triggerMode("E"); return; }
      if (key === "a"){ e.preventDefault(); triggerMode("A"); return; }
      if (key === "s"){ e.preventDefault(); triggerMode("S"); return; }
      if (key === "d"){ e.preventDefault(); triggerMode("D"); return; }
      if (key === "g"){ e.preventDefault(); triggerMode("G"); return; }
      // Z: 뜻풀이 모드
      if (key === "z"){ e.preventDefault(); triggerMode("Z"); return; }
      // X: 부가정보 모드
      if (key === "x"){ e.preventDefault(); triggerMode("X"); return; }
      if (key === "t"){ e.preventDefault(); addCurrentGroupToSelection(); return; }
      if (key === "u"){ e.preventDefault(); loadSelectedPreset(); return; }
      // Y: 선택학습 시작/길게 누르기 처리
      if (key === "y"){
        e.preventDefault();
        if (yHoldTimer) return;
        yHoldTriggered = false;
        yHoldTimer = setTimeout(() => {
          yHoldTriggered = true;
          yHoldTimer = null;
          // 길게 누르면 선택학습을 처음부터 시작합니다.
          selectionResumeIndex = 0;
          selectionResumePoolIndex = 0;
          if (!selectionModeActive){
            startSelectionMode();
          } else {
            currentIndex = 0;
            currentPoolIndex = 0;
            render(false);
          }
        }, 650);
        return;
      }
      if (e.code === "Backquote" && e.shiftKey){ e.preventDefault(); toggleFirebaseLiveSync(); return; }
      if (e.code === "Backquote"){ e.preventDefault(); reconnectFirebaseRoom(); return; }
      if (e.key === "?" && e.shiftKey){ e.preventDefault(); toggleHelpModal(); return; }
      if (key === "f"){ e.preventDefault(); toggleFullscreen(); return; }
      if (key === "r"){ e.preventDefault(); shuffleCurrentOrder(); return; }
      if (key === "c"){ e.preventDefault(); if (imageZoom.scale > 1.01) resetImageZoom(); else zoomImageFit("left"); return; }
      if (key === "m"){ e.preventDefault(); openNoteModal(); return; }
      if (key === "n"){ e.preventDefault(); addNewHeadwordEntry(); return; }
      if (key === "p"){ e.preventDefault(); cyclePlaybackMode(); return; }
      if (key === "h"){ e.preventDefault(); goHome(); return; }
      if (key === "o"){ e.preventDefault(); captureCurrentStage(); return; }

      if (/^[0-9]$/.test(key)){
        e.preventDefault();
        seekToPercent(Number(key));
        return;
      }

      if (e.code === "Comma"){
        e.preventDefault();
        if (e.shiftKey) changePlaybackRate(-1);
        else stepFrame(-1);
        return;
      }

      if (e.code === "Period"){
        e.preventDefault();
        if (e.shiftKey) changePlaybackRate(1);
        else stepFrame(1);
        return;
      }

      if (e.code === "BracketLeft"){
        e.preventDefault();
        setABStart();
        return;
      }

      if (e.code === "BracketRight"){
        e.preventDefault();
        if (bracketRightHoldTimer) return;
        bracketRightHoldTriggered = false;
        bracketRightHoldTimer = setTimeout(() => {
          bracketRightHoldTriggered = true;
          bracketRightHoldTimer = null;
          rememberUndoSnapshot();
          clearABLoop();
        }, 650);
        return;
      }

      if (e.code === "Backslash"){
        e.preventDefault();
        clearABLoop();
        return;
      }

    }

    function handleGlobalKeyup(e){
      const key = e.key ? e.key.toLowerCase() : "";
      // Y 키를 떼면 길게 누르기 여부를 확인합니다. 짧게 눌렀을 경우 선택학습을 시작/종료합니다.
      if (key === "y"){
        if (yHoldTimer){
          clearTimeout(yHoldTimer);
          yHoldTimer = null;
          if (!yHoldTriggered){
            startSelectionMode();
          }
        }
        yHoldTriggered = false;
        return;
      }
      if (e.code !== "BracketRight") return;
      if (bracketRightHoldTimer){
        clearTimeout(bracketRightHoldTimer);
        bracketRightHoldTimer = null;
        if (!bracketRightHoldTriggered){
          rememberUndoSnapshot();
          setABEnd();
        }
      }
      bracketRightHoldTriggered = false;
    }

      document.addEventListener("touchstart", (e) => {

        const rawTarget = e.target && typeof e.target.closest === "function" ? e.target : e.target?.parentElement;
        const itemEl = rawTarget?.closest ? rawTarget.closest(".suggestion-item") : null;
        if (!itemEl) return null;
        const idx = Number(itemEl.dataset.idx || -1);
        return renderedSuggestionItems[idx] || null;

      const handleSuggestionTap = (e) => {
        const item = getSuggestionItemFromEvent(e);

          requestRenderSearchSuggestions();

        clearMultiSelectedSearch();

      els.rangeLookupBtn?.addEventListener("click", openRangeLookupModal);

      els.rangeLookupFillBtn?.addEventListener("click", fillRangeLookupWithCurrentValues);
      els.rangeLookupSearchBtn?.addEventListener("click", () => { submitRangeLookup(); });
      [els.rangeLookupUrl, els.rangeLookupStart, els.rangeLookupEnd].forEach(input => {

      els.loadFileBtn.addEventListener("click", async () => {

      // 선택학습 버튼: 짧게 누르면 시작/종료, 길게 누르면 처음부터 학습하도록 처리합니다.

      els.selectionModeBtn.addEventListener("pointerdown", (e) => {

        selModeHoldTriggered = false;

        selModeHoldTimer = setTimeout(() => {
          selModeHoldTriggered = true;
          selModeHoldTimer = null;
          // 길게 누르면 처음부터 선택학습을 시작합니다. 이미 진행 중이면 현재 인덱스를 초기화합니다.
          selectionResumeIndex = 0;
          selectionResumePoolIndex = 0;
          if (!selectionModeActive){
            startSelectionMode();
          } else {
            currentIndex = 0;
            currentPoolIndex = 0;
            render(false);
          }
        }, 650);
      });
      const finishSelHold = (e) => {
        e.preventDefault();
        if (selModeHoldTimer){
          clearSelHoldTimer();
          if (!selModeHoldTriggered){
            startSelectionMode();
          }
        }
        selModeHoldTriggered = false;
      };
      els.selectionModeBtn.addEventListener("pointerup", finishSelHold);
      els.selectionModeBtn.addEventListener("pointercancel", () => { clearSelHoldTimer(); selModeHoldTriggered = false; });
      els.selectionModeBtn.addEventListener("pointerleave", () => { clearSelHoldTimer(); });
