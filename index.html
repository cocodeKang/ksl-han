      els.stage.addEventListener("touchstart", (e) => {
        if (e.target === els.mainImage && isImageGestureActive()) return;
        if (!e.touches || !e.touches.length) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, {passive:true});

      els.stage.addEventListener("touchend", (e) => {
        if (e.target === els.mainImage && isImageGestureActive()) return;
        if (!stageTouchNavEligible) return;
        if (!e.changedTouches || !e.changedTouches.length) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        if (Math.abs(dx) > 42 && Math.abs(dx) > Math.abs(dy)){
          if (dx < 0) goNext(getShouldAutoplay());
          else goPrev(getShouldAutoplay());
          return;
        }

        if (Math.abs(dy) > 56 && Math.abs(dy) > Math.abs(dx)){
          if (dy < 0) undoLastAction();
          else redoLastAction();
        }
      }, {passive:true});

      const bindTapZone = (el, fn) => {
        if (!el) return;
        let moved = false;
        el.addEventListener("touchstart", () => { moved = false; }, { passive:true });
        el.addEventListener("touchmove", () => { moved = true; }, { passive:true });
        el.addEventListener("touchend", (e) => {
          if (moved || isImageGestureActive()) return;
          e.preventDefault();
          fn();
        }, { passive:false });
        el.addEventListener("click", (e) => {
          if (isImageGestureActive()) return;
          e.preventDefault();
          fn();
        });
      };

      bindTapZone(els.tapPrevZone, () => goPrev(getShouldAutoplay()));
      bindTapZone(els.tapNextZone, () => goNext(getShouldAutoplay()));

      els.stage.addEventListener("click", (e) => {
        if (isMobileViewport()) return;
        if (e.defaultPrevented) return;
        if (e.target?.closest?.('.controls, .topbar, .selection-panel, .suggestions, .mobile-sheet')) return;
        if (e.target === els.mainImage && isImageGestureActive()) return;
        const rect = els.stage.getBoundingClientRect();
        if (!rect.width) return;
        const ratioX = (e.clientX - rect.left) / rect.width;
        if (ratioX <= 0.15){
          goPrev(getShouldAutoplay());
          return;
        }
        if (ratioX >= 0.85){
          goNext(getShouldAutoplay());
          return;
        }
        forceVariantHintPopup();
      });

      els.mainImage.addEventListener("load", () => {
        applyImageZoom();
      });

      els.mainImage.addEventListener("dblclick", (e) => {
        if (!canUseImageZoom()) return;
        e.preventDefault();
        if (imageZoom.scale > 1.01) resetImageZoom();
        else zoomImageFit("center");
      });

      els.mainImage.addEventListener("wheel", (e) => {
        if (!canUseImageZoom() || imageZoom.scale <= 1.01 || !e.shiftKey) return;
        e.preventDefault();
        imageZoom.x += e.deltaY > 0 ? -40 : 40;
        applyImageZoom();
      }, { passive:false });

      els.mainImage.addEventListener("touchstart", (e) => {
        if (!canUseImageZoom()) return;
        if (e.touches.length === 2){
          imageZoom.pinching = true;
          imageZoom.panning = false;
          imageZoom.moved = true;
          imageZoom.startDistance = touchDistance(e.touches[0], e.touches[1]);
          imageZoom.startScale = imageZoom.scale;
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.touches.length === 1 && imageZoom.scale > 1.01){
          imageZoom.panning = true;
          imageZoom.pinching = false;
          imageZoom.moved = false;
          imageZoom.startX = e.touches[0].clientX;
          imageZoom.startY = e.touches[0].clientY;
          imageZoom.startOffsetX = imageZoom.x;
          imageZoom.startOffsetY = imageZoom.y;
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive:false });

      els.mainImage.addEventListener("touchmove", (e) => {
        if (!canUseImageZoom()) return;
        if (e.touches.length === 2 && imageZoom.pinching){
          const dist = touchDistance(e.touches[0], e.touches[1]);
          if (imageZoom.startDistance > 0){
            imageZoom.scale = clamp(imageZoom.startScale * (dist / imageZoom.startDistance), imageZoom.min, imageZoom.max);
            applyImageZoom();
          }
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.touches.length === 1 && imageZoom.panning && imageZoom.scale > 1.01){
          const dx = e.touches[0].clientX - imageZoom.startX;
          const dy = e.touches[0].clientY - imageZoom.startY;
          imageZoom.moved = imageZoom.moved || Math.abs(dx) > 3 || Math.abs(dy) > 3;
          imageZoom.x = imageZoom.startOffsetX + dx;
          imageZoom.y = imageZoom.startOffsetY + dy;
          applyImageZoom();
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive:false });

      els.mainImage.addEventListener("touchend", (e) => {
        if (!canUseImageZoom()) return;
        if (imageZoom.pinching && e.touches.length < 2){
          imageZoom.pinching = false;
          if (imageZoom.scale <= 1.02) resetImageZoom();
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (imageZoom.panning && e.touches.length === 0){
          imageZoom.panning = false;
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.changedTouches && e.changedTouches.length === 1 && !imageZoom.moved){
          const now = Date.now();
          const t = e.changedTouches[0];
          if (now - imageZoom.lastTapAt < 300){
            if (imageZoom.scale > 1.01) resetImageZoom();
            else zoomImageFit("center");
            imageZoom.lastTapAt = 0;
            e.preventDefault();
            e.stopPropagation();
            return;
          }
          imageZoom.lastTapAt = now;
        }
      }, { passive:false });

      els.mainVideo.addEventListener("error", () => {
        showOverlay("영상 자료를 불러오지 못했습니다", 1600);
      });

      els.mainImage.addEventListener("error", () => {
        showOverlay("이미지 자료를 불러오지 못했습니다", 1600);
      });

      els.mainVideo.addEventListener("loadedmetadata", () => {
        if (pendingRestoreTime !== null && isFinite(els.mainVideo.duration)){
          els.mainVideo.currentTime = Math.min(pendingRestoreTime, Math.max(0, els.mainVideo.duration - 0.1));
          pendingRestoreTime = null;
        }
        if (pendingClipFocus && isFinite(els.mainVideo.duration)){
          const clipStart = Number(pendingClipFocus.start);
          if (Number.isFinite(clipStart)){
            try { els.mainVideo.currentTime = Math.min(clipStart, Math.max(0, els.mainVideo.duration - 0.1)); } catch (_) {}
          }
          pendingClipFocus = null;
        }
      });

      els.mainVideo.addEventListener("timeupdate", () => {
        currentVideoTime = els.mainVideo.currentTime;

        if (abLoopStart !== null && abLoopEnd !== null && els.mainVideo.currentTime >= abLoopEnd){
          els.mainVideo.currentTime = abLoopStart;
          if (els.mainVideo.paused) els.mainVideo.play().catch(() => {});
        }
      });

      els.mainVideo.addEventListener("ended", () => {
        if (playbackMode === "CONT"){
          goNext(true);
        }
      });

      window.addEventListener("resize", () => {
        applyImageZoom();
        updateQuickButtons();
        updateLandscapeFocusMode();
        suggestionCacheKey = "";
        updateFirebaseStatus(els.firebaseStatus?.title || els.firebaseStatus?.textContent || "대기중",
          els.firebaseStatus?.classList.contains("error") ? "error" : (els.firebaseStatus?.classList.contains("ok") ? "ok" : "normal"));
      });

      window.addEventListener("orientationchange", () => {
        setTimeout(() => {
          updateLandscapeFocusMode();
          applyImageZoom();
        }, 80);
      });

      setupDragAndDrop();
      updatePlaybackButton();
      updateQuickButtons();
      updateStageGestureState();
      updateLandscapeFocusMode();
    }

    function initEmptyState(){
      filteredGroups = [];
      // 화면 초기화 시 하단 이미지 뷰어를 숨깁니다.
      if (els.viewerBottom) {
        els.viewerBottom.style.display = "none";
      }
      filteredExamplePool = [];
      updateCount();
      renderInfo();
      renderStatus();
      showMainText(
`파일을 불러와 주세요.

기본 파일명:
${DEFAULT_FILENAME}

동작 순서
1) 기본 파일 자동 불러오기 시도
2) 실패하면 IndexedDB 캐시 복원 시도
3) 그래도 없으면 수동 파일 추가

단축키
Q/W/E/A/S/D/G 모드 전환
H 처음 화면
R 전체 순서 섞기
Space 재생/일시정지
0~9 위치 이동
, . 프레임 이동
< > 재생속도
[ ] 구간 반복
O 현재 화면 캡처`);
    }

    async function boot(){
      installMediaDiagnostics();
    bindEvents();
      initEmptyState();
      firebaseBootstrapping = true;
      firebasePushEnabled = false;

      const auxPromise = Promise.allSettled([
        loadSelectionPresets(),
        loadNotesCache()
      ]).catch(err => console.warn("보조 데이터 복원 실패", err));

      const firebaseInitPromise = initFirebaseSync();

      let loaded = false;
      let remoteLoaded = false;

      const firebaseStarted = await firebaseInitPromise;
      if (firebaseStarted){
        remoteLoaded = await loadInitialFirebaseSnapshot({ forceRemote: true, silent: true });
      } else {
        firebaseBootstrapChecked = true;
      }

      loaded = await tryRestoreIndexedCache();
      if (!loaded){
        loaded = await tryAutoLoadDefaultFile();
      }

      await auxPromise;

      if (firebaseStarted && rows.length){
        if (pendingRemoteStateEnvelope){
          remoteLoaded = await applyRemoteStateEnvelope(pendingRemoteStateEnvelope, { silent: true, forceRemote: true }) || remoteLoaded;
        } else if (hasRemoteStateInRoom){
          remoteLoaded = await loadInitialFirebaseSnapshot({ forceRemote: true, silent: true }) || remoteLoaded;
        }
      }

      if (!loaded){
        els.statusText.textContent = "XLSX 파일을 불러오거나 화면에 끌어놓아 주세요";
        showMainText("XLSX 파일을 불러오거나 화면에 끌어놓아 주세요.");
        renderInfo();
      }

      firebaseBootstrapping = false;
      firebasePushEnabled = true;
      if (firebaseStarted && remoteLoaded){
        updateFirebaseStatus(`연결됨 · ${syncRoomKey}`, "ok");
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden" && rows.length){
        pushStateToFirebase(buildStatePayload()).catch(() => {});
      }
    });

    window.addEventListener("pagehide", () => {
      if (rows.length){
        pushStateToFirebase(buildStatePayload()).catch(() => {});
      }
    });

    boot().catch(err => {
      console.error("초기화 실패", err);
      updateFirebaseStatus("초기화 오류", "error");
      els.statusText.textContent = "초기화 중 오류가 발생했습니다";
    });
  </script>
</body>
</html>
